---
- name: Build Fabric Base Config Data
  ansible.builtin.template:
    src: nd_manage_switches_conf.j2
    dest: "{{ role_path }}/files/nd_manage_switches_{{file}}_conf.yaml"
  delegate_to: localhost

- name: Access Fabric Configuration Data and Save to Local Variable
  ansible.builtin.set_fact:
    "{{ 'nd_switches_' + file +'_conf'  }}": "{{ lookup('file', '{{ role_path }}/files/nd_manage_switches_{{file}}_conf.yaml') | from_yaml }}"
  delegate_to: localhost
