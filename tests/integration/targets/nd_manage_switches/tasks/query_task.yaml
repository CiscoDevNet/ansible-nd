---
- name: "Query Task: Authenticate with ND to get token"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/login"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      domain: "{{ ansible_httpapi_login_domain | default('local') }}"
      userName: "{{ ansible_user }}"
      userPasswd: "{{ ansible_password }}"
    validate_certs: false
    return_content: true
    status_code:
      - 200
  register: nd_auth_response
  delegate_to: localhost

- name: "Query Task: Query {{ test_data.test_fabric }} switch data from ND"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/api/v1/manage/fabrics/{{ test_data.test_fabric }}/switches"
    method: GET
    headers:
      Authorization: "Bearer {{ nd_auth_response.json.jwttoken }}"
      Content-Type: "application/json"
    validate_certs: false
    return_content: true
    status_code:
      - 200
      - 404
  register: query_result
  delegate_to: localhost 
