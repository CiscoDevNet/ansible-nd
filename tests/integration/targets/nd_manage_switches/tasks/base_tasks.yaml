---
- name: Test Entry Point - [nd_manage_switches]
  ansible.builtin.debug:
    msg:
      - "----------------------------------------------------------------"
      - "+     Executing Base Tests - [nd_manage_switches]                  +"
      - "----------------------------------------------------------------"

# --------------------------------
# Create Dictionary of Test Data
# --------------------------------
- name: Base - Setup Internal TestCase Variables
  ansible.builtin.set_fact:
    test_data:
      test_fabric: "{{ ansible_it_fabric }}"
      sw1: "{{ ansible_switch1 }}"
      sw2: "{{ ansible_switch2 }}"
      sw3: "{{ ansible_switch3 }}"
      config_actions:
        save: "{{ save }}"
        deploy: "{{ deploy }}"
        type: "{{ config_actions_type }}"
  delegate_to: localhost

# ----------------------------------------------
# Create Module Payloads using Jinja2 Templates
# ----------------------------------------------

- name: Base - Prepare Configuration
  ansible.builtin.set_fact:
    switch_conf:
      - seed_ip: "{{test_data.sw1}}"
        auth_proto: MD5
        role: leaf
      - seed_ip: "{{test_data.sw2}}"
        auth_proto: MD5
        role: spine
      - seed_ip: "{{test_data.sw3}}"
        auth_proto: MD5
        role: border
  delegate_to: localhost


- name: Import Configuration Prepare Tasks
  vars:
    file: base
  ansible.builtin.import_tasks: ./conf_prep_tasks.yaml

# ----------------------------------------------
# Test Setup
# ----------------------------------------------

- name: Base - Verify fabric is reachable via API
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}"
    method: get
  register: fabric_query
  ignore_errors: true

- name: Base - Assert fabric exists
  ansible.builtin.assert:
    that:
      - fabric_query.status == 200
    fail_msg: "Fabric '{{ test_data.test_fabric }}' not found (HTTP {{ fabric_query.status }})."
    success_msg: "Fabric '{{ test_data.test_fabric }}' found."

- name: Base - Clean Up Existing Devices in Fabric
  cisco.nd.nd_manage_switches:
    fabric: "{{ test_data.test_fabric }}"
    state: deleted