---
- name: Test Entry Point - [nd_manage_switches - Poap]
  ansible.builtin.debug:
    msg:
      - "----------------------------------------------------------------"
      - "+     Executing Poap Tests - [nd_manage_switches]                  +"
      - "----------------------------------------------------------------"
  tags: poap

- name: Poap - Setup Internal TestCase Variables
  ansible.builtin.set_fact:
    test_data:
      test_fabric: "{{ ansible_it_fabric }}"
      sw1: "{{ ansible_switch1 }}"
      sw1_serial: "1ABC23DEFGH"
      sw2: "{{ ansible_switch2 }}"
      sw2_serial: "1ABC23DEFHI"
      poap_model: "ABC-D1230a"
      poap_version: "1.2(3)"
      prepro_hostname: "PreProv-SW"
      poap_hostname: "Poap-SW"
      poap_configmodel: "['ABC-D1230a']"
      poap_gateway: "192.168.2.1/24"
      sw3: "{{ ansible_switch3 }}"
      deploy: "{{ deploy }}"
    poap_enabled: false
  delegate_to: localhost
  tags: poap

# Below commented tasks are sample tasks to enable Bootstrap and DHCP along with DHCP configs
# Please make sure you provide correct values for required fields
# Fabric config has many ND/DCNM auto generated values, so always GET the configs first
# and then set the required values.
# 
#
# - name: Poap Merged - Get the configs of the fabric deployed.
#   cisco.nd.nd_rest:
#     path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}"
#     method: get
#   register: result

# - set_fact:
#     result.jsondata.management.day0Bootstrap = true
#     result.jsondata.management.localDhcpServer = true
#     result.jsondata.management.dhcpProtocolVersion = "dhcpv4"
#     result.jsondata.management.dhcpStartAddress = "192.168.1.10"
#     result.jsondata.management.dhcpEndAddress = "192.168.1.20"
#     result.jsondata.management.managementGateway = "192.168.1.1"
#     result.jsondata.management.managementIpv4Prefix = "24"
#
# - name: Poap Merged - Configure Bootstrap and DHCP on Fabric
#   cisco.nd.nd_rest:
#     method: PUT
#     path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}"
#     content: "{{ result.jsondata }}"
