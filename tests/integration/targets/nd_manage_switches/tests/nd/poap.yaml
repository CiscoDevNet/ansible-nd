# ----------------------------------------------
# Run Test Cases
# ----------------------------------------------
# Base Tests
- name: Base - Verify fabric is reachable via API
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}"
    method: get
  register: fabric_query
  ignore_errors: true
  tags: poap

- name: Base - Assert fabric exists
  ansible.builtin.assert:
    that:
      - fabric_query.status == 200
    fail_msg: "Fabric '{{ test_data.test_fabric }}' not found (HTTP {{ fabric_query.status }})."
    success_msg: "Fabric '{{ test_data.test_fabric }}' found."
  tags: poap

- name: POAP Base Task - Set Variable
  ansible.builtin.set_fact:
    poap_enabled: true
  when: fabric_query.status == 200 and fabric_query.jsondata.management.day0Bootstrap
  tags: poap

# TC1
- name: POAP TC1 - Prepare Validate Config
  ansible.builtin.set_fact:
    nd_switches_delete_conf:
  delegate_to: localhost
  tags: poap

- name: POAP TC1 - Clean Up Existing Switches
  cisco.nd.nd_manage_switches:
    fabric: "{{ test_data.test_fabric }}"
    state: deleted
  register: deleted_result
  tags: poap

- name: POAP TC1 - Query Switch State in Fabric
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}/switches"
    method: get
  register: query_result
  tags: poap

- name: POAP TC1 - Validate ND Data
  cisco.nd.nd_inventory_validate:
    nd_data: "{{ query_result }}"
    test_data: "{{ nd_switches_delete_conf }}"
  register: result
  tags: poap

# ---------------------------------------------- #
#                  Merged                        #
# ---------------------------------------------- #

# TC - 1
- name: Poap TC1 - Prepare Configuration
  ansible.builtin.set_fact:
    switch_conf:
      - seed_ip: "{{ test_data.sw2 }}"
        user_name: '{{ switch_username }}'
        password: '{{ switch_password }}'
        role: border
        poap:
          - preprovision_serial: "{{ test_data.sw2_serial }}"
            model: "{{ test_data.poap_model }}"
            version: "{{ test_data.poap_version }}"
            hostname: "{{ test_data.prepro_hostname }}"
            config_data:
              models: "{{ test_data.poap_configmodel }}"
              gateway: "{{ test_data.poap_gateway }}"
  when: poap_enabled == True
  delegate_to: localhost
  tags: poap

- name: Import Configuration Prepare Tasks
  vars:
    file: poap
  ansible.builtin.import_tasks: ../../tasks/conf_prep_tasks.yaml
  when: poap_enabled == True
  tags: poap

- name: Poap TC1 - Merged - Pre-provisioned Switch Configuration
  cisco.nd.nd_manage_switches: &conf_prepro
    fabric: "{{ test_data.test_fabric }}"
    state: merged
    config: "{{ nd_switches_poap_conf }}"
    deploy: "{{ test_data.deploy }}"
  when: poap_enabled == True
  register: merged_result
  tags: poap

- name: Poap TC1 - Merged - Query Switch State in Fabric
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}/switches"
    method: get
  when: poap_enabled == True
  register: query_result
  tags: poap

- name: Poap TC1 - Merged - Validate ND Data
  cisco.nd.nd_inventory_validate:
    nd_data: "{{ query_result }}"
    test_data: "{{ nd_switches_poap_conf }}"
    changed: "{{ merged_result.changed }}"
  when: poap_enabled == True
  register: result
  tags: poap

# TC - 2
- name: Poap TC2 - Merged - Verify Idempotence
  cisco.nd.nd_manage_switches: *conf_prepro
  when: poap_enabled == True
  register: merged_result
  tags: poap

- name: Assert
  ansible.builtin.assert:
    that:
      - 'merged_result.changed == false'
      # - 'merged_result.response == "The switch provided is already part of the fabric and cannot be created again"'
  when: poap_enabled == True
  tags: poap

# TC - 3
- name: Poap TC3 - Prepare Configuration
  ansible.builtin.set_fact:
    switch_conf:
      - seed_ip: "{{ test_data.sw1 }}"
        role: leaf
        poap:
          - serial_number: "{{ test_data.sw1_serial }}"
            model: "{{ test_data.poap_model }}"
            version: "{{ test_data.poap_version }}"
            hostname: "{{ test_data.poap_hostname }}"
            config_data:
              models: "{{ test_data.poap_configmodel }}"
              gateway: "{{ test_data.poap_gateway }}"
      - seed_ip: "{{ test_data.sw3 }}"
        auth_proto: MD5
        role: spine
  when: poap_enabled == True
  delegate_to: localhost
  tags: poap

- name: Import Configuration Prepare Tasks
  vars:
    file: poap
  ansible.builtin.import_tasks: ../../tasks/conf_prep_tasks.yaml
  when: poap_enabled == True
  tags: poap

- name: Poap TC3 - Merge Config
  cisco.nd.nd_manage_switches: &conf_poap
    fabric: "{{ test_data.test_fabric }}"
    state: merged
    config: "{{ nd_switches_poap_conf }}"
    deploy: "{{ test_data.deploy }}"
  when: poap_enabled == True
  register: merged_result
  tags: poap

- name:  Poap TC3 - Merged - Query Switch State in Fabric
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_data.test_fabric }}/switches"
    method: get
  when: poap_enabled == True
  register: query_result
  tags: poap

- name: Poap TC3 - Merged - Validate ND Data
  cisco.nd.nd_inventory_validate:
    nd_data: "{{ query_result }}"
    test_data: "{{ nd_switches_poap_conf }}"
    changed: "{{ merged_result.changed }}"
  when: poap_enabled == True
  register: result
  tags: poap

# TC - 4
- name: Poap TC4 - Verify Idempotence
  cisco.nd.nd_manage_switches: *conf_poap
  when: poap_enabled == True
  register: result
  tags: poap

- name: Assert
  ansible.builtin.assert:
    that:
      - 'result.changed == false'
      # - 'result.response == "The switch provided is already part of the fabric and cannot be created again"'
  when: poap_enabled == True
  tags: poap

# ----------------------------------------------
# Cleanup Fabric Switches
# ----------------------------------------------

- name: Poap - Clean Up Existing Devices
  cisco.nd.nd_manage_switches:
    fabric: "{{ test_data.test_fabric }}"
    state: deleted
  when: poap_enabled == True
  register: deleted_result
  tags: poap
