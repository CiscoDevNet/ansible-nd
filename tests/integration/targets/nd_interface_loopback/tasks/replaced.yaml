# --- SETUP ---
# At this point loopback100 (updated), loopback101, loopback102 exist from merged tests.

# --- REPLACED: FULL REPLACE ---

- name: "REPLACED: Replace loopback100 config entirely (check mode)"
  cisco.nd.nd_interface_loopback:
    output_level: "{{ nd_info.output_level }}"
    fabric_name: "{{ test_fabric_name }}"
    switch_ip: "{{ test_switch_ip }}"
    config:
      - interface_name: loopback100
        config_data:
          network_os:
            policy:
              admin_state: true
              ip: "10.100.100.3"
              description: "Replaced loopback100"
              policy_type: loopback
    state: replaced
  check_mode: true
  register: cm_replaced_100

- name: "REPLACED: Replace loopback100 config entirely (normal mode)"
  cisco.nd.nd_interface_loopback:
    output_level: "{{ nd_info.output_level }}"
    fabric_name: "{{ test_fabric_name }}"
    switch_ip: "{{ test_switch_ip }}"
    config:
      - interface_name: loopback100
        config_data:
          network_os:
            policy:
              admin_state: true
              ip: "10.100.100.3"
              description: "Replaced loopback100"
              policy_type: loopback
    state: replaced
  register: nm_replaced_100

- name: "REPLACED: Verify loopback100 was replaced"
  ansible.builtin.assert:
    that:
      - cm_replaced_100 is changed
      - nm_replaced_100 is changed

- name: "REPLACED: Verify replaced values"
  vars:
    lb100_after: "{{ nm_replaced_100.after | selectattr('interface_name', 'equalto', 'loopback100') | first }}"
  ansible.builtin.assert:
    that:
      - lb100_after.config_data.network_os.policy.ip == "10.100.100.3"
      - lb100_after.config_data.network_os.policy.description == "Replaced loopback100"

# --- REPLACED: IDEMPOTENCY ---

- name: "REPLACED IDEMPOTENT: Re-apply same replaced config"
  cisco.nd.nd_interface_loopback:
    output_level: "{{ nd_info.output_level }}"
    fabric_name: "{{ test_fabric_name }}"
    switch_ip: "{{ test_switch_ip }}"
    config:
      - interface_name: loopback100
        config_data:
          network_os:
            policy:
              admin_state: true
              ip: "10.100.100.3"
              description: "Replaced loopback100"
              policy_type: loopback
    state: replaced
  register: nm_replaced_100_idem

- name: "REPLACED IDEMPOTENT: Verify no change on second run"
  ansible.builtin.assert:
    that:
      - nm_replaced_100_idem is not changed

# --- REPLACED: MULTIPLE INTERFACES ---

- name: "REPLACED MULTI: Replace loopback100 and loopback101 (check mode)"
  cisco.nd.nd_interface_loopback:
    output_level: "{{ nd_info.output_level }}"
    fabric_name: "{{ test_fabric_name }}"
    switch_ip: "{{ test_switch_ip }}"
    config:
      - interface_name: loopback100
        config_data:
          network_os:
            policy:
              admin_state: true
              ip: "10.100.100.4"
              description: "Replaced again loopback100"
              policy_type: loopback
      - "{{ loopback_101_updated }}"
    state: replaced
  check_mode: true
  register: cm_replaced_multi

- name: "REPLACED MULTI: Replace loopback100 and loopback101 (normal mode)"
  cisco.nd.nd_interface_loopback:
    output_level: "{{ nd_info.output_level }}"
    fabric_name: "{{ test_fabric_name }}"
    switch_ip: "{{ test_switch_ip }}"
    config:
      - interface_name: loopback100
        config_data:
          network_os:
            policy:
              admin_state: true
              ip: "10.100.100.4"
              description: "Replaced again loopback100"
              policy_type: loopback
      - "{{ loopback_101_updated }}"
    state: replaced
  register: nm_replaced_multi

- name: "REPLACED MULTI: Verify both interfaces were replaced"
  ansible.builtin.assert:
    that:
      - cm_replaced_multi is changed
      - nm_replaced_multi is changed

- name: "REPLACED MULTI: Verify replaced values for both interfaces"
  vars:
    lb100_after: "{{ nm_replaced_multi.after | selectattr('interface_name', 'equalto', 'loopback100') | first }}"
    lb101_after: "{{ nm_replaced_multi.after | selectattr('interface_name', 'equalto', 'loopback101') | first }}"
  ansible.builtin.assert:
    that:
      - lb100_after.config_data.network_os.policy.ip == "10.100.100.4"
      - lb100_after.config_data.network_os.policy.description == "Replaced again loopback100"
      - lb101_after.config_data.network_os.policy.ip == "10.100.101.2"
      - lb101_after.config_data.network_os.policy.admin_state == false
