- name: Test that we have a Nexus Dashboard host, username and password
  ansible.builtin.fail:
    msg: 'Please define the following variables: ansible_host, ansible_user and ansible_password.'
  when: ansible_host is not defined or ansible_user is not defined or ansible_password is not defined

- name: Set vars
  ansible.builtin.set_fact:
    nd_info: &nd_info
      output_level: '{{ api_key_output_level | default("debug") }}'
    test_fabric: "{{ test_fabric_name | default('test_fabric') }}"

- name: Ensure tenants do not exist before test starts
  cisco.nd.nd_infra_tenant: &clean_all_tenants
    <<: *nd_info
    config:
      - name: ansible_tenant
      - name: ansible_tenant_2
      - name: ansible_tenant_3
    state: deleted


# --- MERGED STATE TESTS ---

# MERGED STATE TESTS: CREATE (basic tenants)
- name: Create tenants with full and minimum configuration (merged state - check mode)
  cisco.nd.nd_infra_tenant: &create_tenant_merged_state
    <<: *nd_info
    config:
      - name: ansible_tenant
        description: Tenant managed by Ansible
      - name: ansible_tenant_2
    state: merged
  check_mode: true
  register: cm_merged_create_tenants

- name: Create tenants with full and minimum configuration (merged state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *create_tenant_merged_state
  register: nm_merged_create_tenants

- name: Create tenants again (merged state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *create_tenant_merged_state
  register: nm_merged_create_tenants_again

- name: Asserts for tenants merged state creation tasks
  ansible.builtin.assert:
    that:
      - cm_merged_create_tenants is changed
      - nm_merged_create_tenants is changed
      - nm_merged_create_tenants_again is not changed
      - nm_merged_create_tenants.after | length >= 2
      - nm_merged_create_tenants.proposed.0.name == "ansible_tenant"
      - nm_merged_create_tenants.proposed.0.description == "Tenant managed by Ansible"
      - nm_merged_create_tenants.proposed.1.name == "ansible_tenant_2"

# MERGED STATE TESTS: UPDATE (description only)
- name: Update ansible_tenant description (merged state - check mode)
  cisco.nd.nd_infra_tenant: &update_tenant_merged_state
    <<: *nd_info
    config:
      - name: ansible_tenant
        description: Updated tenant description
    state: merged
  check_mode: true
  register: cm_merged_update_tenant

- name: Update ansible_tenant description (merged state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *update_tenant_merged_state
  register: nm_merged_update_tenant

- name: Update ansible_tenant description again (merged state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *update_tenant_merged_state
  register: nm_merged_update_tenant_again

- name: Asserts for tenants merged state update tasks
  ansible.builtin.assert:
    that:
      - cm_merged_update_tenant is changed
      - nm_merged_update_tenant is changed
      - nm_merged_update_tenant_again is not changed
      - nm_merged_update_tenant.proposed.0.name == "ansible_tenant"
      - nm_merged_update_tenant.proposed.0.description == "Updated tenant description"

# MERGED STATE TESTS: CREATE WITH FABRIC ASSOCIATIONS
- name: Create tenant with fabric associations (merged state - check mode)
  cisco.nd.nd_infra_tenant: &create_tenant_with_assoc_merged
    <<: *nd_info
    config:
      - name: ansible_tenant_3
        description: Tenant with fabric associations
        fabric_associations:
          - fabric_name: "{{ test_fabric }}"
            allowed_vlans:
              - "10-20"
              - "30-40"
    state: merged
  check_mode: true
  register: cm_merged_create_tenant_with_assoc

- name: Create tenant with fabric associations (merged state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *create_tenant_with_assoc_merged
  register: nm_merged_create_tenant_with_assoc

- name: Create tenant with fabric associations again (merged state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *create_tenant_with_assoc_merged
  register: nm_merged_create_tenant_with_assoc_again

- name: Asserts for tenant with fabric associations merged state creation tasks
  ansible.builtin.assert:
    that:
      - cm_merged_create_tenant_with_assoc is changed
      - nm_merged_create_tenant_with_assoc is changed
      - nm_merged_create_tenant_with_assoc_again is not changed
      - nm_merged_create_tenant_with_assoc.proposed.0.name == "ansible_tenant_3"
      - nm_merged_create_tenant_with_assoc.proposed.0.fabric_associations | length == 1
      - nm_merged_create_tenant_with_assoc.proposed.0.fabric_associations.0.fabric_name == test_fabric
      - nm_merged_create_tenant_with_assoc.proposed.0.fabric_associations.0.allowed_vlans | length == 2

# MERGED STATE TESTS: UPDATE FABRIC ASSOCIATIONS
- name: Update tenant fabric associations (merged state - check mode)
  cisco.nd.nd_infra_tenant: &update_tenant_assoc_merged
    <<: *nd_info
    config:
      - name: ansible_tenant_3
        fabric_associations:
          - fabric_name: "{{ test_fabric }}"
            allowed_vlans:
              - "10-50"
              - "60-80"
            local_name: tenant3_local
    state: merged
  check_mode: true
  register: cm_merged_update_tenant_assoc

- name: Update tenant fabric associations (merged state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *update_tenant_assoc_merged
  register: nm_merged_update_tenant_assoc

- name: Update tenant fabric associations again (merged state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *update_tenant_assoc_merged
  register: nm_merged_update_tenant_assoc_again

- name: Asserts for tenant fabric associations merged state update tasks
  ansible.builtin.assert:
    that:
      - cm_merged_update_tenant_assoc is changed
      - nm_merged_update_tenant_assoc is changed
      - nm_merged_update_tenant_assoc_again is not changed
      - nm_merged_update_tenant_assoc.proposed.0.fabric_associations.0.allowed_vlans | length == 2
      - nm_merged_update_tenant_assoc.proposed.0.fabric_associations.0.local_name == "tenant3_local"


# --- REPLACED STATE TESTS ---

- name: Replace tenant configuration (replaced state - check mode)
  cisco.nd.nd_infra_tenant: &replace_tenant_state
    <<: *nd_info
    config:
      - name: ansible_tenant
        description: Replaced tenant description
    state: replaced
  check_mode: true
  register: cm_replaced_tenant

- name: Replace tenant configuration (replaced state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *replace_tenant_state
  register: nm_replaced_tenant

- name: Replace tenant configuration again (replaced state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *replace_tenant_state
  register: nm_replaced_tenant_again

- name: Asserts for tenants replaced state tasks
  ansible.builtin.assert:
    that:
      - cm_replaced_tenant is changed
      - nm_replaced_tenant is changed
      - nm_replaced_tenant_again is not changed
      - nm_replaced_tenant.proposed.0.name == "ansible_tenant"
      - nm_replaced_tenant.proposed.0.description == "Replaced tenant description"

# REPLACED STATE TESTS: WITH FABRIC ASSOCIATIONS
- name: Replace tenant with fabric associations (replaced state - check mode)
  cisco.nd.nd_infra_tenant: &replace_tenant_with_assoc
    <<: *nd_info
    config:
      - name: ansible_tenant_3
        description: Replaced tenant with new associations
        fabric_associations:
          - fabric_name: "{{ test_fabric }}"
            allowed_vlans:
              - "500-600"
    state: replaced
  check_mode: true
  register: cm_replaced_tenant_with_assoc

- name: Replace tenant with fabric associations (replaced state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *replace_tenant_with_assoc
  register: nm_replaced_tenant_with_assoc

- name: Replace tenant with fabric associations again (replaced state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *replace_tenant_with_assoc
  register: nm_replaced_tenant_with_assoc_again

- name: Asserts for tenant with fabric associations replaced state tasks
  ansible.builtin.assert:
    that:
      - cm_replaced_tenant_with_assoc is changed
      - nm_replaced_tenant_with_assoc is changed
      - nm_replaced_tenant_with_assoc_again is not changed
      - nm_replaced_tenant_with_assoc.proposed.0.fabric_associations.0.allowed_vlans.0 == "500-600"


# --- OVERRIDDEN STATE TESTS ---

- name: Override all tenants (overridden state - check mode)
  cisco.nd.nd_infra_tenant: &override_tenant_state
    <<: *nd_info
    config:
      - name: ansible_tenant_3
        description: Only tenant after override
        fabric_associations:
          - fabric_name: "{{ test_fabric }}"
            allowed_vlans:
              - "1-100"
    state: overridden
  check_mode: true
  register: cm_overridden_tenant

- name: Override all tenants (overridden state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *override_tenant_state
  register: nm_overridden_tenant

- name: Override all tenants again (overridden state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *override_tenant_state
  register: nm_overridden_tenant_again

- name: Asserts for tenants overridden state tasks
  ansible.builtin.assert:
    that:
      - cm_overridden_tenant is changed
      - nm_overridden_tenant is changed
      - nm_overridden_tenant_again is not changed
      - nm_overridden_tenant.proposed.0.name == "ansible_tenant_3"
      - nm_overridden_tenant.proposed.0.description == "Only tenant after override"
      - nm_overridden_tenant.proposed.0.fabric_associations | length == 1


# --- DELETED STATE TESTS ---

- name: Delete tenants (deleted state - check mode)
  cisco.nd.nd_infra_tenant: &delete_tenant_state
    <<: *nd_info
    config:
      - name: ansible_tenant_3
    state: deleted
  check_mode: true
  register: cm_deleted_tenant

- name: Delete tenants (deleted state - normal mode)
  cisco.nd.nd_infra_tenant:
    <<: *delete_tenant_state
  register: nm_deleted_tenant

- name: Delete tenants again (deleted state - idempotency)
  cisco.nd.nd_infra_tenant:
    <<: *delete_tenant_state
  register: nm_deleted_tenant_again

- name: Asserts for tenants deleted state tasks
  ansible.builtin.assert:
    that:
      - cm_deleted_tenant is changed
      - nm_deleted_tenant is changed
      - nm_deleted_tenant_again is not changed


# --- CLEANUP ---

- name: Ensure all test tenants are cleaned up
  cisco.nd.nd_infra_tenant:
    <<: *clean_all_tenants
