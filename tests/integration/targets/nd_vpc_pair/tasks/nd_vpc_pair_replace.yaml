##############################################
##                 SETUP                    ##
##############################################

- name: Import nd_vpc_pair Base Tasks
  ansible.builtin.import_tasks: base_tasks.yaml
  tags: replace

- name: REPLACE - Set nd_info defaults
  ansible.builtin.set_fact:
    nd_info: &nd_info
      output_level: '{{ api_key_output_level | default("debug") }}'
  tags: replace

##############################################
##      Setup Replace TestCase Variables   ##
##############################################

- name: REPLACE - Setup initial config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
  delegate_to: localhost
  tags: replace

- name: Import Configuration Prepare Tasks - replace_initial
  vars:
    file: replace_initial
  ansible.builtin.import_tasks: conf_prep_tasks.yaml
  tags: replace

- name: REPLACE - Setup replaced config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: false
  delegate_to: localhost
  tags: replace

- name: Import Configuration Prepare Tasks - replace_replaced
  vars:
    file: replace_replaced
  ansible.builtin.import_tasks: conf_prep_tasks.yaml
  tags: replace

##############################################
##                REPLACE                  ##
##############################################

# TC1 - Create initial vPC pair using replace state
- name: REPLACE - TC1 - REPLACE - Create vPC pair using replace state
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: replaced
    deploy: false
    config: "{{ nd_vpc_pair_replace_initial_conf }}"
  register: result
  tags: replace

- name: REPLACE - TC1 - ASSERT - Check if changed flag is true
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
  tags: replace

- name: REPLACE - TC1 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    state: gathered
    fabric_name: "{{ test_fabric }}"
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: replace

- name: REPLACE - TC1 - VALIDATE - Verify vPC pair state in ND
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_replace_initial_conf }}"
  register: validation
  tags: replace

- name: REPLACE - TC1 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: replace

# TC2 - Replace vPC pair configuration
- name: REPLACE - TC2 - REPLACE - Replace vPC pair configuration
  cisco.nd.nd_manage_vpc_pair: &conf_replaced
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: replaced
    deploy: false
    config: "{{ nd_vpc_pair_replace_replaced_conf }}"
  register: result
  tags: replace

- name: REPLACE - TC2 - ASSERT - Check if changed flag is true for LANClassic
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
  when: test_fabric_type == "LANClassic"
  tags: replace

- name: REPLACE - TC2 - ASSERT - Check if changed flag is false for VXLANFabric
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == false
  when: test_fabric_type == "VXLANFabric"
  tags: replace

- name: REPLACE - TC2 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    state: gathered
    fabric_name: "{{ test_fabric }}"
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: replace

- name: REPLACE - TC2 - VALIDATE - Verify replaced vPC pair state
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_replace_replaced_conf }}"
    mode: "full"
  register: validation
  when: test_fabric_type == "LANClassic"
  tags: replace

- name: REPLACE - TC2 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  when: test_fabric_type == "LANClassic"
  tags: replace

# TC3 - Idempotence test
- name: REPLACE - TC3 - conf - Idempotence
  cisco.nd.nd_manage_vpc_pair: *conf_replaced
  register: result
  tags: replace

- name: REPLACE - TC3 - ASSERT - Check if changed flag is false
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
  tags: replace

# TC4 - Replace with deploy enabled
- name: REPLACE - TC4 - DELETE - Ensure vPC pair absent before deploy test
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  tags: replace

- name: REPLACE - TC4 - REPLACE - Create vPC pair with deploy true
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: replaced
    deploy: true
    config: "{{ nd_vpc_pair_replace_initial_conf }}"
  register: result
  tags: replace

- name: REPLACE - TC4 - ASSERT - Verify deploy path execution
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - result.deployment is defined
      - (result.deployment_needed | default(result.deployment.deployment_needed | default(false))) | bool == true
  tags: replace

- name: REPLACE - TC4 - ASSERT - Verify config-save and deploy API traces
  ansible.builtin.assert:
    that:
      - result.deployment.response is defined
      - (result.deployment.response | length) >= 2
      - >
        (
          result.deployment.response
          | selectattr('REQUEST_PATH', 'search', '/actions/configSave')
          | list
          | length
        ) > 0
      - >
        (
          result.deployment.response
          | selectattr('REQUEST_PATH', 'search', '/actions/deploy')
          | list
          | length
        ) > 0
  tags: replace

- name: REPLACE - TC4 - GATHER - Verify pair exists after deploy flow
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    state: gathered
    fabric_name: "{{ test_fabric }}"
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: replace

- name: REPLACE - TC4 - VALIDATE - Verify deployed replace config
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_replace_initial_conf }}"
    mode: "exists"
  register: validation
  tags: replace

- name: REPLACE - TC4 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: replace

# TC5 - vpc_pair_details extended coverage (single replace testcase)
- name: REPLACE - TC5 - REPLACE - Apply extended vpc_pair_details payload
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: replaced
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
        vpc_pair_details: "{{ vpc_pair_details_extended }}"
  register: result
  when: test_fabric_type == "LANClassic"
  tags: replace

- name: REPLACE - TC5 - API - Query direct vpcPair state for extended details verification
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPair"
    method: get
  register: tc5_vpc_pair_direct
  when: test_fabric_type == "LANClassic"
  tags: replace

- name: REPLACE - TC5 - ASSERT - Verify base pair state from direct API
  ansible.builtin.assert:
    that:
      - tc5_vpc_pair_direct.failed == false
      - tc5_vpc_pair_direct.current is mapping
      - (tc5_vpc_pair_direct.current.switchId | default('')) == test_switch1
      - (tc5_vpc_pair_direct.current.peerSwitchId | default('')) == test_switch2
      - (tc5_vpc_pair_direct.current.useVirtualPeerLink | default(false)) | bool == true
  when: test_fabric_type == "LANClassic"
  tags: replace

- name: REPLACE - TC5 - Set flag when direct API returns detailed payload
  ansible.builtin.set_fact:
    tc5_has_vpc_pair_details: >-
      {{
        (
          (tc5_vpc_pair_direct.current.vpcPairDetails is defined)
          and (tc5_vpc_pair_direct.current.vpcPairDetails is not none)
        )
        or
        (
          (tc5_vpc_pair_direct.current.vpc_pair_details is defined)
          and (tc5_vpc_pair_direct.current.vpc_pair_details is not none)
        )
      }}
  when: test_fabric_type == "LANClassic"
  tags: replace

- name: REPLACE - TC5 - VALIDATE - Verify extended vpc_pair_details state
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ {'vpc_pairs': [tc5_vpc_pair_direct.current]} }}"
    expected_data:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
        vpc_pair_details: "{{ vpc_pair_details_extended }}"
    mode: "full"
    validate_vpc_pair_details: true
  register: tc5_validation
  when:
    - test_fabric_type == "LANClassic"
    - tc5_has_vpc_pair_details | default(false) | bool
  tags: replace

- name: REPLACE - TC5 - WARN - Skip strict details validation when API omits details
  ansible.builtin.debug:
    msg: >-
      Direct vpcPair API omitted vpcPairDetails for {{ test_switch1 }}-{{ test_switch2 }};
      strict vpc_pair_details validation skipped for this run.
  when:
    - test_fabric_type == "LANClassic"
    - not (tc5_has_vpc_pair_details | default(false) | bool)
  tags: replace

- name: REPLACE - TC5 - ASSERT - Extended details validation passed
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - (tc5_has_vpc_pair_details | default(false) | bool == false) or (tc5_validation.failed == false)
  when: test_fabric_type == "LANClassic"
  tags: replace

# TC6 - Replace with config_actions save+deploy
- name: REPLACE - TC6 - DELETE - Ensure vPC pair absent before config_actions test
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  tags: replace

- name: REPLACE - TC6 - REPLACE - Create vPC pair with config_actions save+deploy
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: replaced
    config_actions:
      save: true
      deploy: true
      type: switch
    config: "{{ nd_vpc_pair_replace_initial_conf }}"
  register: result
  tags: replace

- name: REPLACE - TC6 - ASSERT - Verify config_actions save+deploy execution
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - result.deployment is defined
      - result.deployment.config_actions is defined
      - result.deployment.config_actions.save == true
      - result.deployment.config_actions.deploy == true
      - result.deployment.config_actions.type == "switch"
      - result.deployment.response is defined
      - (result.deployment.response | length) >= 2
      - >
        (
          result.deployment.response
          | selectattr('REQUEST_PATH', 'search', '/actions/configSave')
          | list
          | length
        ) > 0
      - >
        (
          result.deployment.response
          | selectattr('REQUEST_PATH', 'search', '/actions/deploy')
          | list
          | length
        ) > 0
  tags: replace

# TC7 - check_mode should not apply replace configuration changes
- name: REPLACE - TC7 - DELETE - Ensure vPC pair is absent before check_mode test
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  tags: replace

- name: REPLACE - TC7 - REPLACE - Run check_mode create for vPC pair
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: replaced
    deploy: false
    config: "{{ nd_vpc_pair_replace_initial_conf }}"
  check_mode: true
  register: result
  tags: replace

- name: REPLACE - TC7 - ASSERT - Verify check_mode invocation succeeded
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - result.deployment is not defined
  tags: replace

- name: REPLACE - TC7 - GATHER - Verify check_mode flow did not create vPC pair
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    state: gathered
    deploy: false
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: replace

- name: REPLACE - TC7 - VALIDATE - Confirm no persistent changes from check_mode flow
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: replace

- name: REPLACE - TC7 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: replace

##############################################
##                 CLEAN-UP                 ##
##############################################

- name: REPLACE - END - remove vPC pairs
  cisco.nd.nd_manage_vpc_pair:
    <<: *nd_info
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  when: cleanup_at_end | default(true)
  tags: replace
