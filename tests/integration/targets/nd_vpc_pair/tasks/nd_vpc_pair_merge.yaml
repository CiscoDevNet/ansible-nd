  tags: merge

- name: MERGE - TC8 - ASSERT - Verify custom vpc_pair_details path
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - result.logs is defined
      - result.logs | to_json is search('"vpcPairDetails"')
      - result.logs | to_json is search('"templateName"')
      - result.logs | to_json is search('"templateConfig"')
  tags: merge

- name: MERGE - TC8 - API - Query direct vpcPair state for switch1
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPair"
