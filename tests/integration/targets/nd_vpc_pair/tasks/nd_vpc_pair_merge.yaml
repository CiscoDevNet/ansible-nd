##############################################
##                 SETUP                    ##
##############################################

- name: Import nd_vpc_pair Base Tasks
  ansible.builtin.import_tasks: base_tasks.yaml
  tags: merge

##############################################
##      Setup Merge TestCase Variables     ##
##############################################

- name: MERGE - Setup full config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
        vpc_pair_details:
          type: default
          domain_id: 20
          switch_keep_alive_local_ip: "192.0.2.21"
          peer_switch_keep_alive_local_ip: "192.0.2.22"
          keep_alive_vrf: management
  delegate_to: localhost
  tags: merge

- name: Import Configuration Prepare Tasks - merge_full
  vars:
    file: merge_full
  ansible.builtin.import_tasks: conf_prep_tasks.yaml
  tags: merge

- name: MERGE - Setup modified config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: false
  delegate_to: localhost
  tags: merge

- name: Import Configuration Prepare Tasks - merge_modified
  vars:
    file: merge_modified
  ansible.builtin.import_tasks: conf_prep_tasks.yaml
  tags: merge

- name: MERGE - Setup minimal config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  delegate_to: localhost
  tags: merge

- name: Import Configuration Prepare Tasks - merge_minimal
  vars:
    file: merge_minimal
  ansible.builtin.import_tasks: conf_prep_tasks.yaml
  tags: merge

- name: MERGE - Setup no-deploy config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
  delegate_to: localhost
  tags: merge

- name: Import Configuration Prepare Tasks - merge_no_deploy
  vars:
    file: merge_no_deploy
  ansible.builtin.import_tasks: conf_prep_tasks.yaml
  tags: merge

##############################################
##                MERGE                    ##
##############################################

# TC1 - Create vPC pair with full configuration
- name: MERGE - TC1 - MERGE - Create vPC pair with full configuration
  cisco.nd.nd_manage_vpc_pair: &conf_full
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: false
    config: "{{ nd_vpc_pair_merge_full_conf }}"
  register: result
  tags: merge

- name: MERGE - TC1 - ASSERT - Check if changed flag is true
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
  tags: merge

- name: MERGE - TC1 - ASSERT - Verify full config payload includes vpc_pair_details
  ansible.builtin.assert:
    that:
      - result.logs is defined
      - result.logs | to_json is search('"vpcPairDetails"')
      - result.logs | to_json is search('"domainId"')
      - result.logs | to_json is search('"switchKeepAliveLocalIp"')
      - result.logs | to_json is search('"peerSwitchKeepAliveLocalIp"')
      - result.logs | to_json is search('"keepAliveVrf"')
  tags: merge

- name: MERGE - TC1 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    deploy: false
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: merge

- name: MERGE - TC1 - VALIDATE - Verify vPC pair state in ND
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_merge_full_conf }}"
    changed: "{{ result.changed }}"
  register: validation
  tags: merge

- name: MERGE - TC1 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: merge

- name: MERGE - TC1 - conf - Idempotence
  cisco.nd.nd_manage_vpc_pair: *conf_full
  register: result
  tags: merge

- name: MERGE - TC1 - ASSERT - Check if changed flag is false
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.class_diff.created | default([]) | length == 0
      - result.class_diff.deleted | default([]) | length == 0
      - >-
        (
          result.changed == false
        ) or (
          result.changed == true
          and (result.class_diff.updated | default([]) | length) > 0
          and ('vpcPairDetails' in (result.class_diff.updated[0].changed_properties | default([])))
        )
  tags: merge

# TC2 - Modify existing vPC pair configuration
- name: MERGE - TC2 - MERGE - Modify vPC pair configuration
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: false
    config: "{{ nd_vpc_pair_merge_modified_conf }}"
  register: result
  when: test_fabric_type == "LANClassic"
  tags: merge

- name: MERGE - TC2 - ASSERT - Check if changed flag is true
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
  when: test_fabric_type == "LANClassic"
  tags: merge

- name: MERGE - TC2 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    deploy: false
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  when: test_fabric_type == "LANClassic"
  tags: merge

- name: MERGE - TC2 - VALIDATE - Verify modified vPC pair state
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_merge_modified_conf }}"
    mode: "full"
  register: validation
  when: test_fabric_type == "LANClassic"
  tags: merge

- name: MERGE - TC2 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  when: test_fabric_type == "LANClassic"
  tags: merge

