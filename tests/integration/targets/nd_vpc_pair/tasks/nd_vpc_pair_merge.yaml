# TC10 - Create vPC pair with deploy enabled (actual deployment path)
- name: MERGE - TC10 - DELETE - Ensure vPC pair is absent before deploy test
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  tags: merge

- name: MERGE - TC10 - MERGE - Create vPC pair with deploy true
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: true
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
  register: result
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify deploy path execution
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.deployment is defined
      - (result.deployment_needed | default(result.deployment.deployment_needed | default(false))) | bool == true
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify config-save and deploy API traces
  ansible.builtin.assert:
    that:
      - result.deployment.response is defined
      - (result.deployment.response | length) >= 2
      - >
        (
          result.deployment.response
          | selectattr('REQUEST_PATH', 'search', '/actions/configSave')
          | list
          | length
        ) > 0
      - >
        (
          result.deployment.response
          | selectattr('REQUEST_PATH', 'search', '/actions/deploy')
          | list
          | length
        ) > 0
  tags: merge

- name: MERGE - TC10 - GATHER - Query gathered pair after deploy flow
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    deploy: false
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: tc10_gather_result
  tags: merge

- name: MERGE - TC10 - PREP - Extract target pair from gathered output
  ansible.builtin.set_fact:
    tc10_gathered_pair: >-
      {{
        (
          tc10_gather_result.gathered.vpc_pairs
          | selectattr('switch_id', 'equalto', test_switch1)
          | selectattr('peer_switch_id', 'equalto', test_switch2)
          | list
          | first
        )
        | default(
            (
              tc10_gather_result.gathered.vpc_pairs
              | selectattr('switch_id', 'equalto', test_switch2)
              | selectattr('peer_switch_id', 'equalto', test_switch1)
              | list
              | first
            ),
            true
          )
      }}
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify use_virtual_peer_link is true in gathered output
  ansible.builtin.assert:
    that:
      - tc10_gather_result.failed == false
      - tc10_gathered_pair is mapping
      - >
        (
          tc10_gathered_pair.use_virtual_peer_link
          | default(tc10_gathered_pair.useVirtualPeerLink | default(false))
          | bool
        ) == true
  tags: merge

- name: MERGE - TC10 - API - Query vpcPairSupport checkPairing for both peers
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ item }}/vpcPairSupport?componentType=checkPairing"
    method: get
  loop:
    - "{{ test_switch1 }}"
    - "{{ test_switch2 }}"
  register: tc10_pairing_support
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify checkPairing support responses
  ansible.builtin.assert:
    that:
      - item.failed == false
      - item.current is mapping
      - item.current.isPairingAllowed is defined
      - item.current.isPairingAllowed | bool
  loop: "{{ tc10_pairing_support.results | default([]) }}"
  tags: merge

- name: MERGE - TC10 - API - Query vpcPairSupport checkFabricPeeringSupport for both peers
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ item }}/vpcPairSupport?componentType=checkFabricPeeringSupport"
    method: get
  loop:
    - "{{ test_switch1 }}"
    - "{{ test_switch2 }}"
  register: tc10_fabric_peering_support
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify fabric peering support endpoint responses
  ansible.builtin.assert:
    that:
      - item.failed == false
      - item.current is mapping
      - item.current.isVpcFabricPeeringSupported is defined
      - >
        (
          item.current.isVpcFabricPeeringSupported | bool
        ) or (
          (item.current.status | default("") | lower) is search("not supported")
        )
    quiet: true
  loop: "{{ tc10_fabric_peering_support.results | default([]) }}"
  tags: merge

- name: MERGE - TC10 - API - Query vpcPairOverview with componentType=full
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPairOverview?componentType=full"
    method: get
  register: tc10_overview_full
  tags: merge

- name: MERGE - TC10 - API - Query vpcPairOverview with componentType=pairsInfo
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPairOverview?componentType=pairsInfo"
    method: get
  register: tc10_overview_pairs_info
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify vpcPairOverview endpoint responses
  ansible.builtin.assert:
    that:
      - tc10_overview_full.failed == false
      - tc10_overview_full.current is defined
      - tc10_overview_pairs_info.failed == false
      - tc10_overview_pairs_info.current is defined
  tags: merge

- name: MERGE - TC10 - API - Query vpcPairConsistency for switch1
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPairConsistency"
    method: get
  register: tc10_consistency
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify vpcPairConsistency endpoint response
  ansible.builtin.assert:
    that:
      - tc10_consistency.failed == false
      - tc10_consistency.current is defined
  tags: merge

- name: MERGE - TC10 - API - Query vPC pairs list endpoint directly
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/vpcPairs"
    method: get
  register: tc10_vpc_pairs
  tags: merge

- name: MERGE - TC10 - CHECK - Determine if /vpcPairs list has data
  ansible.builtin.set_fact:
    tc10_list_has_pairs: "{{ (tc10_vpc_pairs.current.vpcPairs | default([]) | length) > 0 }}"
  tags: merge

# NOTE: eBGP (VXLAN eBGP) fabrics may return an empty /vpcPairs list even when
# pairs exist. The module's gathered query works via switch-level fallback
# endpoints. Skip list-vs-gathered comparison when the list API returns empty.
- name: MERGE - TC10 - PREP - Extract target pair from /vpcPairs response
  ansible.builtin.set_fact:
    tc10_pair_from_list: >-
      {{
        (
          tc10_vpc_pairs.current.vpcPairs
          | default([])
          | selectattr('switchId', 'equalto', test_switch1)
          | selectattr('peerSwitchId', 'equalto', test_switch2)
          | list
          | first
        )
        | default(
            (
              tc10_vpc_pairs.current.vpcPairs
              | default([])
              | selectattr('switchId', 'equalto', test_switch2)
              | selectattr('peerSwitchId', 'equalto', test_switch1)
              | list
              | first
            ),
            true
          )
      }}
  when: tc10_list_has_pairs | bool
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify /vpcPairs useVirtualPeerLink alignment
  ansible.builtin.assert:
    that:
      - tc10_vpc_pairs.failed == false
      - tc10_pair_from_list is mapping
      - tc10_gather_vpl == true
      - not tc10_list_has_vpl or tc10_list_vpl == tc10_gather_vpl
    quiet: true
  vars:
    tc10_list_has_vpl: >-
      {{
        tc10_pair_from_list.useVirtualPeerLink is defined
        or
        tc10_pair_from_list.useVirtualPeerlink is defined
      }}
    tc10_list_vpl: >-
      {{
        (
          tc10_pair_from_list.useVirtualPeerLink
          | default(tc10_pair_from_list.useVirtualPeerlink | default(false))
        )
        | bool
      }}
    tc10_gather_vpl: >-
      {{
        (
          tc10_gathered_pair.use_virtual_peer_link
          | default(tc10_gathered_pair.useVirtualPeerLink | default(false))
        )
        | bool
      }}
  when: tc10_list_has_pairs | bool
  tags: merge

# TC11 - Idempotent deploy=true should skip deployment when nothing changed
- name: MERGE - TC11 - MERGE - Re-run same config with deploy true
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: true
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
  register: result
  tags: merge

- name: MERGE - TC11 - ASSERT - Verify deploy=true idempotent skip behavior
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == false
      - result.deployment is defined
      - (result.deployment_needed | default(result.deployment.deployment_needed | default(false))) | bool == false
      - result.deployment.msg is search("skipping deployment")
  tags: merge

# TC12 - check_mode should not apply configuration changes
- name: MERGE - TC12 - DELETE - Ensure vPC pair is absent before check_mode test
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  tags: merge

- name: MERGE - TC12 - MERGE - Run check_mode create for vPC pair
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: false
    config: "{{ nd_vpc_pair_merge_full_conf }}"
  check_mode: true
  register: result
  tags: merge

- name: MERGE - TC12 - ASSERT - Verify check_mode invocation succeeded
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - result.deployment is not defined
  tags: merge

# TC13 - check_mode + deploy preview should report deployment plan without applying
- name: MERGE - TC13 - MERGE - Run check_mode create with deploy preview
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: true
    config: "{{ nd_vpc_pair_merge_full_conf }}"
  check_mode: true
  register: result
  tags: merge

- name: MERGE - TC13 - ASSERT - Verify check_mode deployment preview
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.deployment is defined
      - result.deployment.would_deploy is defined
      - result.deployment.would_deploy | bool == true
      - (result.deployment_needed | default(result.deployment.deployment_needed | default(false))) | bool == true
  tags: merge

- name: MERGE - TC13 - GATHER - Verify check_mode flows did not create vPC pair
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    deploy: false
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: merge

- name: MERGE - TC13 - VALIDATE - Confirm no persistent changes from check_mode flows
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: merge

- name: MERGE - TC13 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: merge

# TC14 - Validate vpcPairSupport enforcement path (isPairingAllowed == false)
- name: MERGE - TC14 - PREP - Query fabric switches for support validation
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches"
    method: get
  register: switches_result
  tags: merge

- name: MERGE - TC14 - PREP - Query pairing support for each switch
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ item }}/vpcPairSupport?componentType=checkPairing"
    method: get
  loop: "{{ (switches_result.current.switches | default([])) | map(attribute='serialNumber') | select('defined') | list }}"
  register: support_result
  failed_when: false
  tags: merge

- name: MERGE - TC14 - PREP - Choose blocked and allowed switch candidates
  ansible.builtin.set_fact:
    blocked_switch_id: >-
      {{
        (
          support_result.results
          | selectattr('current', 'defined')
          | selectattr('current.isPairingAllowed', 'defined')
          | selectattr('current.isPairingAllowed', 'equalto', false)
          | map(attribute='item')
          | list
          | first
        ) | default('')
      }}
    allowed_switch_id: >-
      {{
        (
          support_result.results
          | selectattr('current', 'defined')
          | selectattr('current.isPairingAllowed', 'defined')
          | selectattr('current.isPairingAllowed', 'equalto', true)
          | map(attribute='item')
          | list
          | first
        ) | default('')
      }}
  tags: merge

- name: MERGE - TC14 - PREP - Determine if support enforcement scenario is available
  ansible.builtin.set_fact:
    tc14_supported_scenario: >-
      {{
        (blocked_switch_id | length > 0)
        and (allowed_switch_id | length > 0)
        and (blocked_switch_id != allowed_switch_id)
      }}
  tags: merge

- name: MERGE - TC14 - INFO - Skip support enforcement validation when no blocked switch exists
  ansible.builtin.debug:
    msg: >-
      Skipping TC14 because no switch reports isPairingAllowed=false in this lab.
      blocked_switch_id='{{ blocked_switch_id }}', allowed_switch_id='{{ allowed_switch_id }}'
  when: not tc14_supported_scenario
  tags: merge

- name: MERGE - TC14 - MERGE - Verify unsupported pairing is blocked by module
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: false
    config:
      - peer1_switch_id: "{{ blocked_switch_id }}"
        peer2_switch_id: "{{ allowed_switch_id }}"
        use_virtual_peer_link: true
  register: result
  failed_when: false
  when: tc14_supported_scenario
  tags: merge

- name: MERGE - TC14 - ASSERT - Validate unsupported pairing failure details
  ansible.builtin.assert:
    that:
      - result.failed == true
      - >
        (
          (result.msg is search("VPC pairing is not allowed for switch"))
          and (result.support_details is defined)
          and (result.support_details.isPairingAllowed == false)
        )
        or
        (
          (result.msg is search("Switch conflicts detected"))
          and (result.conflicts is defined)
          and ((result.conflicts | length) > 0)
        )
  when: tc14_supported_scenario
  tags: merge

##############################################
##                 CLEAN-UP                 ##
##############################################

- name: MERGE - END - remove vPC pairs
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  failed_when: false
  when: cleanup_at_end | default(true)
  tags: merge
