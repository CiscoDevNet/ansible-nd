    gathered_data: "{{ {'vpc_pairs': [tc8_vpc_pair_direct.current]} }}"
    expected_data:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
    mode: "full"
    validate_vpc_pair_details: false
  register: tc8_validation
  tags: merge

- name: MERGE - TC8 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - tc8_vpc_pair_direct.failed == false
      - tc8_vpc_pair_direct.current is mapping
      - tc8_validation.failed == false
  tags: merge

