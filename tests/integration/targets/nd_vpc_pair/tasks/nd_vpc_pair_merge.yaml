# TC10 - Create vPC pair with deploy enabled (actual deployment path)
- name: MERGE - TC10 - DELETE - Ensure vPC pair is absent before deploy test
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  ignore_errors: true
  tags: merge

- name: MERGE - TC10 - PREP - Query fabric peering support for switch1
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPairSupport?componentType=checkFabricPeeringSupport"
    method: get
  register: tc10_support_switch1
  ignore_errors: true
  tags: merge

- name: MERGE - TC10 - PREP - Query fabric peering support for switch2
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch2 }}/vpcPairSupport?componentType=checkFabricPeeringSupport"
    method: get
  register: tc10_support_switch2
  ignore_errors: true
  tags: merge

- name: MERGE - TC10 - PREP - Decide virtual peer link flag for deploy test
  ansible.builtin.set_fact:
    tc10_use_virtual_peer_link: >-
      {{
        (not (tc10_support_switch1.failed | default(false))) and
        (not (tc10_support_switch2.failed | default(false))) and
        (tc10_support_switch1.current.isVpcFabricPeeringSupported | default(false) | bool) and
        (tc10_support_switch2.current.isVpcFabricPeeringSupported | default(false) | bool)
      }}
  tags: merge

- name: MERGE - TC10 - MERGE - Create vPC pair with deploy true
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: true
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: "{{ tc10_use_virtual_peer_link }}"
  register: result
  tags: merge

- name: MERGE - TC10 - ASSERT - Verify deploy path execution
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.deployment is defined
  tags: merge

