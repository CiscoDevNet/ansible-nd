# TC7 - Merge with vpc_pair_details default template settings
- name: MERGE - TC7 - MERGE - Update vPC pair with default vpc_pair_details
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: false
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
        vpc_pair_details:
          type: default
          domain_id: 10
          switch_keep_alive_local_ip: "192.0.2.11"
          peer_switch_keep_alive_local_ip: "192.0.2.12"
          keep_alive_vrf: management
  register: result
  tags: merge

- name: MERGE - TC7 - ASSERT - Verify default vpc_pair_details path
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
      - result.logs is defined
      - result.logs | to_json is search('"vpcPairDetails"')
      - result.logs | to_json is search('"domainId"')
      - result.logs | to_json is search('"switchKeepAliveLocalIp"')
      - result.logs | to_json is search('"peerSwitchKeepAliveLocalIp"')
      - result.logs | to_json is search('"keepAliveVrf"')
  tags: merge

- name: MERGE - TC7 - API - Query direct vpcPair state for switch1
  cisco.nd.nd_rest:
    path: "/api/v1/manage/fabrics/{{ test_fabric }}/switches/{{ test_switch1 }}/vpcPair"
    method: get
  register: tc7_vpc_pair_direct
  tags: merge

- name: MERGE - TC7 - VALIDATE - Verify pair state after default details update
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ {'vpc_pairs': [tc7_vpc_pair_direct.current]} }}"
    expected_data:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
    mode: "full"
    validate_vpc_pair_details: false
  register: tc7_validation
  tags: merge

- name: MERGE - TC7 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - tc7_vpc_pair_direct.failed == false
      - tc7_vpc_pair_direct.current is mapping
      - tc7_validation.failed == false
  tags: merge

# TC8 - Merge with vpc_pair_details custom template settings
- name: MERGE - TC8 - MERGE - Update vPC pair with custom vpc_pair_details
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    deploy: false
