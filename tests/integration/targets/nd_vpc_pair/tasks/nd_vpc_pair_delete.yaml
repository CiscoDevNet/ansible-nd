##############################################
##                 SETUP                    ##
##############################################

- name: Import nd_vpc_pair Base Tasks
  import_tasks: base_tasks.yaml
  tags: delete

##############################################
##      Setup Delete TestCase Variables    ##
##############################################

- name: DELETE - Setup config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
  delegate_to: localhost
  tags: delete

- name: Import Configuration Prepare Tasks - delete_setup
  vars:
    file: delete_setup
  import_tasks: conf_prep_tasks.yaml
  tags: delete

##############################################
##                DELETE                   ##
##############################################

# TC1 - Setup: Create vPC pair for deletion tests
- name: DELETE - TC1 - MERGE - Create vPC pair for deletion testing
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    config: "{{ nd_vpc_pair_delete_setup_conf }}"
  register: result
  tags: delete

- name: DELETE - TC1 - ASSERT - Check if creation successful
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
  tags: delete

- name: DELETE - TC1 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: gathered
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: delete

- name: DELETE - TC1 - VALIDATE - Verify vPC pair state in ND
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_delete_setup_conf }}"
    mode: "exists"
  register: validation
  tags: delete

- name: DELETE - TC1 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: delete

# TC2 - Delete vPC pair with specific config
- name: DELETE - TC2 - DELETE - Delete vPC pair with specific peer config
  cisco.nd.nd_manage_vpc_pair: &delete_specific
    fabric_name: "{{ test_fabric }}"
    state: deleted
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: result
  tags: delete

- name: DELETE - TC2 - ASSERT - Check if deletion successful
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
  tags: delete

- name: DELETE - TC2 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: gathered
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: delete

- name: DELETE - TC2 - VALIDATE - Verify vPC pair deletion
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: delete

- name: DELETE - TC2 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: delete

# TC3 - Idempotence test for deletion
- name: DELETE - TC3 - conf - Idempotence
  cisco.nd.nd_manage_vpc_pair: *delete_specific
  register: result
  tags: delete

- name: DELETE - TC3 - ASSERT - Check if changed flag is false
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
  tags: delete

# TC4 - Create another vPC pair for bulk deletion test
- name: DELETE - TC4 - MERGE - Create vPC pair for bulk deletion testing
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    config: "{{ nd_vpc_pair_delete_setup_conf }}"
  register: result
  tags: delete

- name: DELETE - TC4 - ASSERT - Check if creation successful
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
  tags: delete

- name: DELETE - TC4 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: gathered
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: delete

- name: DELETE - TC4 - VALIDATE - Verify vPC pair state in ND for bulk deletion setup
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_delete_setup_conf }}"
    mode: "exists"
  register: validation
  tags: delete

- name: DELETE - TC4 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: delete

# TC5 - Delete all vPC pairs without specific config
- name: DELETE - TC5 - DELETE - Delete all vPC pairs without specific config
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
  register: result
  tags: delete

- name: DELETE - TC5 - ASSERT - Check if bulk deletion successful
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true or (result.current | length) == 0
  tags: delete

- name: DELETE - TC5 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: gathered
  register: verify_result
  tags: delete

- name: DELETE - TC5 - VALIDATE - Verify bulk deletion
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: delete

- name: DELETE - TC5 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: delete

# TC6 - Delete from empty fabric (should be no-op)
- name: DELETE - TC6 - DELETE - Delete from empty fabric (no-op)
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
  register: result
  tags: delete

- name: DELETE - TC6 - ASSERT - Check if no change occurred
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
  tags: delete

# TC7 - Force deletion bypass path
- name: DELETE - TC7 - MERGE - Create vPC pair for force delete test
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: merged
    config: "{{ nd_vpc_pair_delete_setup_conf }}"
  register: result
  tags: delete

- name: DELETE - TC7 - ASSERT - Verify setup creation for force test
  ansible.builtin.assert:
    that:
      - result.failed == false
  tags: delete

- name: DELETE - TC7 - DELETE - Delete vPC pair with force true
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
    force: true
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: result
  tags: delete

- name: DELETE - TC7 - ASSERT - Verify force delete execution
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == true
  tags: delete

- name: DELETE - TC7 - GATHER - Verify force deletion result in ND
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: gathered
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: delete

- name: DELETE - TC7 - VALIDATE - Confirm pair deleted with force
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: delete

- name: DELETE - TC7 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: delete

##############################################
##                 CLEAN-UP                 ##
##############################################

- name: DELETE - END - ensure clean state
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
  when: cleanup_at_end | default(true)
  tags: delete
