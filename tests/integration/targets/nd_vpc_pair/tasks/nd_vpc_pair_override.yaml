##############################################
##                 SETUP                    ##
##############################################

- name: Import nd_vpc_pair Base Tasks
  import_tasks: base_tasks.yaml
  tags: override

##############################################
##      Setup Override TestCase Variables  ##
##############################################

- name: OVERRIDE - Setup initial config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: true
  delegate_to: localhost
  tags: override

- name: Import Configuration Prepare Tasks - override_initial
  vars:
    file: override_initial
  import_tasks: conf_prep_tasks.yaml
  tags: override

- name: OVERRIDE - Setup overridden config
  ansible.builtin.set_fact:
    vpc_pair_conf:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
        use_virtual_peer_link: false
  delegate_to: localhost
  tags: override

- name: Import Configuration Prepare Tasks - override_overridden
  vars:
    file: override_overridden
  import_tasks: conf_prep_tasks.yaml
  tags: override

##############################################
##               OVERRIDE                 ##
##############################################

# TC1 - Override with a new vPC switch pair
- name: OVERRIDE - TC1 - OVERRIDE - Create vPC pair using override state
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: overridden
    config: "{{ nd_vpc_pair_override_initial_conf }}"
  register: result
  tags: override

- name: OVERRIDE - TC1 - ASSERT - Check if changed flag is true
  ansible.builtin.assert:
    that:
      - result.failed == false
  tags: override

- name: OVERRIDE - TC1 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: override

- name: OVERRIDE - TC1 - VALIDATE - Verify vPC pair state in ND
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_override_initial_conf }}"
  register: validation
  tags: override

- name: OVERRIDE - TC1 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: override

# TC2 - Override with same vPC switch pair with changes
- name: OVERRIDE - TC2 - OVERRIDE - Override vPC pair with changes
  cisco.nd.nd_manage_vpc_pair: &conf_overridden
    fabric_name: "{{ test_fabric }}"
    state: overridden
    config: "{{ nd_vpc_pair_override_overridden_conf }}"
  register: result
  tags: override

- name: OVERRIDE - TC2 - ASSERT - Check if changed flag is true for LANClassic
  ansible.builtin.assert:
    that:
      - result.failed == false
  when: test_fabric_type == "LANClassic"
  tags: override

- name: OVERRIDE - TC2 - ASSERT - Check if changed flag is false for VXLANFabric
  ansible.builtin.assert:
    that:
      - result.failed == false
  when: test_fabric_type == "VXLANFabric"
  tags: override

- name: OVERRIDE - TC2 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    fabric_name: "{{ test_fabric }}"
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: verify_result
  tags: override

- name: OVERRIDE - TC2 - VALIDATE - Verify overridden vPC pair state
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: "{{ nd_vpc_pair_override_overridden_conf }}"
    mode: "full"
  register: validation
  when: test_fabric_type == "LANClassic"
  tags: override

- name: OVERRIDE - TC2 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  when: test_fabric_type == "LANClassic"
  tags: override

# TC3 - Idempotence test
- name: OVERRIDE - TC3 - conf - Idempotence
  cisco.nd.nd_manage_vpc_pair: *conf_overridden
  register: result
  tags: override

- name: OVERRIDE - TC3 - ASSERT - Check if changed flag is false
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
  tags: override

# TC4 - Override existing vPC pair with no config (delete all)
- name: OVERRIDE - TC4 - OVERRIDE - Delete all vPC pairs via override with no config
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: overridden
    config: []
  register: result
  tags: override

- name: OVERRIDE - TC4 - ASSERT - Check if deletion successful
  ansible.builtin.assert:
    that:
      - result.failed == false
  tags: override

- name: OVERRIDE - TC4 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    fabric_name: "{{ test_fabric }}"
  register: verify_result
  tags: override

- name: OVERRIDE - TC4 - VALIDATE - Verify vPC pair deletion via override
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: override

- name: OVERRIDE - TC4 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: override

# TC5 - Gather to verify deletion
- name: OVERRIDE - TC5 - GATHER - Verify vPC pair deletion
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: gathered
    config:
      - peer1_switch_id: "{{ test_switch1 }}"
        peer2_switch_id: "{{ test_switch2 }}"
  register: result
  until:
    - '(result.gathered.vpc_pairs | length) == 0'
  retries: 30
  delay: 5
  tags: override

# TC6 - Override with no vPC pair and no config (should be no-op)
- name: OVERRIDE - TC6 - OVERRIDE - Override with no vPC pairs (no-op)
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: overridden
    config: []
  register: result
  tags: override

- name: OVERRIDE - TC6 - ASSERT - Check if no change occurred
  ansible.builtin.assert:
    that:
      - result.failed == false
  tags: override

- name: OVERRIDE - TC6 - GATHER - Get vPC pair state in ND
  cisco.nd.nd_manage_vpc_pair:
    state: gathered
    fabric_name: "{{ test_fabric }}"
  register: verify_result
  tags: override

- name: OVERRIDE - TC6 - VALIDATE - Verify no-op override
  cisco.nd.tests.integration.nd_vpc_pair_validate:
    gathered_data: "{{ verify_result }}"
    expected_data: []
    mode: "count_only"
  register: validation
  tags: override

- name: OVERRIDE - TC6 - ASSERT - Validation passed
  ansible.builtin.assert:
    that:
      - validation.failed == false
  tags: override

##############################################
##                 CLEAN-UP                 ##
##############################################

- name: OVERRIDE - END - remove vPC pairs
  cisco.nd.nd_manage_vpc_pair:
    fabric_name: "{{ test_fabric }}"
    state: deleted
  when: cleanup_at_end | default(true)
  tags: override
