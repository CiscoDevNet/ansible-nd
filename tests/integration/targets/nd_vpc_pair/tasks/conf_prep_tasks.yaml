---
# Shared configuration preparation tasks for nd_vpc_pair integration tests.
#
# Usage:
#   - name: Import Configuration Prepare Tasks
#     vars:
#       file: merge  # output file identifier
#     import_tasks: conf_prep_tasks.yaml
#
# Requires: vpc_pair_conf variable to be set before importing.

- name: Build vPC Pair Config Data from Template
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../files"
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: Build vPC Pair Config Data from Template
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/nd_vpc_pair_conf.j2"
    dest: "{{ playbook_dir }}/../files/nd_vpc_pair_{{ file }}_conf.yaml"
  delegate_to: localhost

- name: Load Configuration Data into Variable
  ansible.builtin.set_fact:
    "{{ 'nd_vpc_pair_' + file + '_conf' }}": "{{ lookup('file', playbook_dir + '/../files/nd_vpc_pair_' + file + '_conf.yaml') | from_yaml }}"
  delegate_to: localhost
