- name: Run nd_links numbered policy lifecycle
  module_defaults:
    cisco.nd.nd_links:
      output_level: '{{ nd_output_level | default("debug") }}'
      fabric_name: '{{ test_fabric_numbered }}'
      link_scope: manage
  block:
    - name: Ensure numbered links do not exist before tests
      cisco.nd.nd_links: &numbered_cleanup
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/31
            dst_interface_name: Ethernet1/31
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/32
            dst_interface_name: Ethernet1/32
        state: deleted

    - name: Create three numbered links (merged - check mode)
      cisco.nd.nd_links: &numbered_create
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.30.1
                dst_ip: 10.99.30.2
                mtu: 9216
                speed: auto
                fec: auto
                interface_admin_state: true
                src_interface_description: ansible numbered 30 source
                dst_interface_description: ansible numbered 30 destination
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/31
            dst_interface_name: Ethernet1/31
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.31.1
                dst_ip: 10.99.31.2
                mtu: 9216
                speed: auto
                fec: auto
                interface_admin_state: true
                src_interface_description: ansible numbered 31 source
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/32
            dst_interface_name: Ethernet1/32
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.32.1
                dst_ip: 10.99.32.2
                mtu: 9216
                interface_admin_state: true
        state: merged
      check_mode: true
      register: cm_numbered_create

    - name: Create three numbered links (merged - normal mode)
      cisco.nd.nd_links:
        <<: *numbered_create
      register: nm_numbered_create

    - name: Create three numbered links again (idempotency)
      cisco.nd.nd_links:
        <<: *numbered_create
      register: nm_numbered_create_again

    - name: Asserts for numbered create
      ansible.builtin.assert:
        that:
          - cm_numbered_create is changed
          - cm_numbered_create.proposed | length == 3
          - cm_numbered_create.proposed.0.config_data.policy_type == "numbered"
          - cm_numbered_create.proposed.0.config_data.template_inputs.src_ip == "10.99.30.1"
          - cm_numbered_create.proposed.0.config_data.template_inputs.mtu == 9216

          - nm_numbered_create is changed
          - (nm_numbered_create.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | list) | length == 1
          - (nm_numbered_create.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 1
          - (nm_numbered_create.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 1
          - (nm_numbered_create.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.policy_type == "numbered"
          - (nm_numbered_create.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.src_ip == "10.99.30.1"

          - nm_numbered_create_again is not changed

    - name: Update numbered link Eth1/30 (merged - check mode)
      cisco.nd.nd_links: &numbered_update
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.30.1
                dst_ip: 10.99.30.2
                mtu: 1500
                speed: auto
                fec: auto
                interface_admin_state: true
                src_interface_description: updated numbered source
                dst_interface_description: updated numbered destination
        state: merged
      check_mode: true
      register: cm_numbered_update

    - name: Update numbered link Eth1/30 (merged - normal mode)
      cisco.nd.nd_links:
        <<: *numbered_update
      register: nm_numbered_update

    - name: Update numbered link Eth1/30 again (idempotency)
      cisco.nd.nd_links:
        <<: *numbered_update
      register: nm_numbered_update_again

    - name: Asserts for numbered update
      ansible.builtin.assert:
        that:
          - cm_numbered_update is changed
          - cm_numbered_update.proposed.0.config_data.template_inputs.mtu == 1500

          - nm_numbered_update is changed
          - (nm_numbered_update.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.mtu == 1500
          - (nm_numbered_update.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.src_interface_description == "updated numbered source"

          - nm_numbered_update_again is not changed

    - name: Replace numbered link Eth1/30 (replaced - check mode)
      cisco.nd.nd_links: &numbered_replace
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.30.1
                dst_ip: 10.99.30.2
                mtu: 9216
                interface_admin_state: true
        state: replaced
      check_mode: true
      register: cm_numbered_replace

    - name: Replace numbered link Eth1/30 (replaced - normal mode)
      cisco.nd.nd_links:
        <<: *numbered_replace
      register: nm_numbered_replace

    - name: Replace numbered link Eth1/30 again (idempotency)
      cisco.nd.nd_links:
        <<: *numbered_replace
      register: nm_numbered_replace_again

    - name: Asserts for numbered replace
      ansible.builtin.assert:
        that:
          - cm_numbered_replace is changed
          - cm_numbered_replace.proposed.0.config_data.template_inputs.mtu == 9216

          - nm_numbered_replace is changed
          - (nm_numbered_replace.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.mtu == 9216
          - (nm_numbered_replace.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 1
          - (nm_numbered_replace.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 1

          - nm_numbered_replace_again is not changed

    - name: Override down to a single numbered link (overridden - check mode)
      cisco.nd.nd_links: &numbered_override
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.30.1
                dst_ip: 10.99.30.2
                mtu: 9216
                interface_admin_state: true
        state: overridden
      check_mode: true
      register: cm_numbered_override

    - name: Override down to a single numbered link (overridden - normal mode)
      cisco.nd.nd_links:
        <<: *numbered_override
      register: nm_numbered_override

    - name: Override down to a single numbered link again (idempotency)
      cisco.nd.nd_links:
        <<: *numbered_override
      register: nm_numbered_override_again

    - name: Asserts for numbered override
      ansible.builtin.assert:
        that:
          - cm_numbered_override is changed

          - nm_numbered_override is changed
          - (nm_numbered_override.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | list) | length == 1
          - (nm_numbered_override.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 0
          - (nm_numbered_override.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 0

          - nm_numbered_override_again is not changed

    - name: Re-create Eth1/31 and Eth1/32 for delete coverage
      cisco.nd.nd_links:
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/31
            dst_interface_name: Ethernet1/31
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.31.1
                dst_ip: 10.99.31.2
                mtu: 9216
                interface_admin_state: true
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/32
            dst_interface_name: Ethernet1/32
            config_data:
              policy_type: numbered
              template_inputs:
                src_ip: 10.99.32.1
                dst_ip: 10.99.32.2
                mtu: 9216
                interface_admin_state: true
        state: merged

    - name: Delete numbered link Eth1/30 (deleted - check mode)
      cisco.nd.nd_links: &numbered_delete_one
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
        state: deleted
      check_mode: true
      register: cm_numbered_delete

    - name: Delete numbered link Eth1/30 (deleted - normal mode)
      cisco.nd.nd_links:
        <<: *numbered_delete_one
      register: nm_numbered_delete

    - name: Delete numbered link Eth1/30 again (idempotency)
      cisco.nd.nd_links:
        <<: *numbered_delete_one
      register: nm_numbered_delete_again

    - name: Bulk delete remaining numbered links
      cisco.nd.nd_links: &numbered_bulk_delete
        config:
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/31
            dst_interface_name: Ethernet1/31
          - src_fabric_name: '{{ test_fabric_numbered }}'
            dst_fabric_name: '{{ test_fabric_numbered }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/32
            dst_interface_name: Ethernet1/32
        state: deleted
      register: nm_numbered_bulk_delete

    - name: Bulk delete remaining numbered links again (idempotency)
      cisco.nd.nd_links:
        <<: *numbered_bulk_delete
      register: nm_numbered_bulk_delete_again

    - name: Asserts for numbered delete
      ansible.builtin.assert:
        that:
          - cm_numbered_delete is changed
          - nm_numbered_delete is changed
          - (nm_numbered_delete.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | list) | length == 0
          - nm_numbered_delete_again is not changed

          - nm_numbered_bulk_delete is changed
          - (nm_numbered_bulk_delete.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 0
          - (nm_numbered_bulk_delete.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 0

          - nm_numbered_bulk_delete_again is not changed

    - name: Final cleanup of numbered links
      cisco.nd.nd_links:
        <<: *numbered_cleanup
