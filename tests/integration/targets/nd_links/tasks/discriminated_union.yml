- name: Create a numbered link baseline for discriminated-union tests
  cisco.nd.nd_links:
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.30.1
            dst_ip: 10.99.30.2
            mtu: 9216
            interface_admin_state: true
    state: merged

- name: Attempt to set ebgp_multihop on a numbered link (should fail)
  cisco.nd.nd_links:
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.30.1
            dst_ip: 10.99.30.2
            ebgp_multihop: 5
    state: merged
  register: invalid_field_result
  ignore_errors: true

- name: Verify invalid field was rejected by Pydantic
  ansible.builtin.assert:
    that:
      - invalid_field_result is failed
      - invalid_field_result.msg is search("ebgp_multihop")
        or invalid_field_result.msg is search("[Ee]xtra")
        or invalid_field_result.msg is search("not permitted")

- name: Attempt to change policy_type from numbered to ebgpVrfLite in place (should fail)
  cisco.nd.nd_links:
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
        config_data:
          policy_type: ebgpVrfLite
          template_inputs:
            src_ebgp_asn: "65001"
            dst_ebgp_asn: "65002"
            src_ip_address_mask: 10.99.30.1/24
            dst_ip_address: 10.99.30.2
    state: merged
  register: policy_change_result
  ignore_errors: true

- name: Verify policy_type change was rejected with clear guidance
  ansible.builtin.assert:
    that:
      - policy_change_result is failed
      - policy_change_result.msg is search("policy_type")

- name: Exercise cross-policy delete+recreate (opt-in; requires compatible fabric)
  when: nd_test_cross_policy_fabric is defined
  block:
    - name: Delete the numbered link first
      cisco.nd.nd_links:
        config:
          - src_fabric_name: '{{ nd_test_cross_policy_fabric }}'
            dst_fabric_name: '{{ nd_test_cross_policy_fabric }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
        state: deleted

    - name: Recreate on same interface with new policy type (ebgpVrfLite)
      cisco.nd.nd_links:
        config:
          - src_fabric_name: '{{ nd_test_cross_policy_fabric }}'
            dst_fabric_name: '{{ nd_test_cross_policy_fabric }}'
            src_switch_name: '{{ test_switch_a }}'
            dst_switch_name: '{{ test_switch_b }}'
            src_interface_name: Ethernet1/30
            dst_interface_name: Ethernet1/30
            config_data:
              policy_type: ebgpVrfLite
              template_inputs:
                src_ebgp_asn: "65001"
                dst_ebgp_asn: "65002"
                src_ip_address_mask: 10.99.30.1/24
                dst_ip_address: 10.99.30.2
                link_mtu: 9216
        state: merged
      register: recreate_result

    - name: Verify delete+recreate worked for policy type change
      ansible.builtin.assert:
        that:
          - recreate_result is changed
          - (recreate_result.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.policy_type == "ebgpVrfLite"
          - (recreate_result.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.src_ebgp_asn == "65001"
          - (recreate_result.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.dst_ebgp_asn == "65002"
