- name: Update numbered link attributes (merged state - check mode)
  cisco.nd.nd_links: &update_numbered_link_merged_state
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.30.1
            dst_ip: 10.99.30.2
            mtu: 1500
            speed: auto
            fec: auto
            interface_admin_state: true
            src_interface_description: updated numbered source
            dst_interface_description: updated numbered destination
    state: merged
  check_mode: true
  register: cm_merged_update_numbered_link

- name: Update numbered link attributes (merged state - normal mode)
  cisco.nd.nd_links:
    <<: *update_numbered_link_merged_state
  register: nm_merged_update_numbered_link

- name: Update numbered link attributes again (merged state - idempotency)
  cisco.nd.nd_links:
    <<: *update_numbered_link_merged_state
  register: nm_merged_update_numbered_link_again

- name: Asserts for numbered link update tasks
  ansible.builtin.assert:
    that:
      - cm_merged_update_numbered_link is changed
      - cm_merged_update_numbered_link.proposed.0.config_data.template_inputs.mtu == 1500
      - cm_merged_update_numbered_link.proposed.0.config_data.template_inputs.src_interface_description == "updated numbered source"
      - (cm_merged_update_numbered_link.before | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.mtu == 9216

      - nm_merged_update_numbered_link is changed
      - (nm_merged_update_numbered_link.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.mtu == 1500
      - (nm_merged_update_numbered_link.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.src_interface_description == "updated numbered source"
      - (nm_merged_update_numbered_link.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.dst_interface_description == "updated numbered destination"
      - (nm_merged_update_numbered_link.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | first).config_data.policy_type == "numbered"
      - (nm_merged_update_numbered_link.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | first).config_data.policy_type == "numbered"

      - nm_merged_update_numbered_link_again is not changed
