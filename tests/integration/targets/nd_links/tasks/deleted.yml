- name: Re-create Eth1/31 and Eth1/32 for single vs bulk delete coverage
  cisco.nd.nd_links:
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/31
        dst_interface_name: Ethernet1/31
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.31.1
            dst_ip: 10.99.31.2
            mtu: 9216
            interface_admin_state: true
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/32
        dst_interface_name: Ethernet1/32
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.32.1
            dst_ip: 10.99.32.2
            mtu: 9216
            interface_admin_state: true
    state: merged

- name: Delete numbered link only (deleted state - check mode)
  cisco.nd.nd_links: &delete_numbered_link
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
    state: deleted
  check_mode: true
  register: cm_delete_numbered_link

- name: Delete numbered link only (deleted state - normal mode)
  cisco.nd.nd_links:
    <<: *delete_numbered_link
  register: nm_delete_numbered_link

- name: Delete numbered link again (deleted state - idempotency)
  cisco.nd.nd_links:
    <<: *delete_numbered_link
  register: nm_delete_numbered_link_again

- name: Bulk delete the remaining two links
  cisco.nd.nd_links: &bulk_delete_remaining
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/31
        dst_interface_name: Ethernet1/31
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/32
        dst_interface_name: Ethernet1/32
    state: deleted
  register: nm_bulk_delete

- name: Bulk delete again (deleted state - idempotency)
  cisco.nd.nd_links:
    <<: *bulk_delete_remaining
  register: nm_bulk_delete_again

- name: Asserts for deletion tasks
  ansible.builtin.assert:
    that:
      - cm_delete_numbered_link is changed
      - cm_delete_numbered_link.proposed | length == 1
      - cm_delete_numbered_link.proposed.0.src_interface_name == "Ethernet1/30"

      - nm_delete_numbered_link is changed
      - (nm_delete_numbered_link.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | list) | length == 0

      - nm_delete_numbered_link_again is not changed

      - nm_bulk_delete is changed
      - (nm_bulk_delete.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 0
      - (nm_bulk_delete.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 0

      - nm_bulk_delete_again is not changed
