- name: Override with only the numbered link present (overridden state - check mode)
  cisco.nd.nd_links: &override_numbered_only
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.30.1
            dst_ip: 10.99.30.2
            mtu: 9216
            interface_admin_state: true
    state: overridden
  check_mode: true
  register: cm_override_links

- name: Override with only the numbered link present (overridden state - normal mode)
  cisco.nd.nd_links:
    <<: *override_numbered_only
  register: nm_override_links

- name: Override with only the numbered link present again (overridden state - idempotency)
  cisco.nd.nd_links:
    <<: *override_numbered_only
  register: nm_override_links_again

- name: Asserts for overridden state tasks
  ansible.builtin.assert:
    that:
      - cm_override_links is changed
      - (cm_override_links.before | selectattr('src_interface_name', 'in', ['Ethernet1/30', 'Ethernet1/31', 'Ethernet1/32']) | list) | length == 3

      - nm_override_links is changed
      - (nm_override_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | list) | length == 1
      - (nm_override_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 0
      - (nm_override_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 0

      - nm_override_links_again is not changed
