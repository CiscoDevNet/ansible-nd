- name: Create three numbered links (merged state - check mode)
  cisco.nd.nd_links: &create_links_merged_state
    config:
      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/30
        dst_interface_name: Ethernet1/30
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.30.1
            dst_ip: 10.99.30.2
            mtu: 9216
            speed: auto
            fec: auto
            interface_admin_state: true
            src_interface_description: ansible numbered 30 source
            dst_interface_description: ansible numbered 30 destination

      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/31
        dst_interface_name: Ethernet1/31
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.31.1
            dst_ip: 10.99.31.2
            mtu: 9216
            speed: auto
            fec: auto
            interface_admin_state: true
            src_interface_description: ansible numbered 31 source

      - src_fabric_name: '{{ test_fabric }}'
        dst_fabric_name: '{{ test_fabric }}'
        src_switch_name: '{{ test_switch_a }}'
        dst_switch_name: '{{ test_switch_b }}'
        src_interface_name: Ethernet1/32
        dst_interface_name: Ethernet1/32
        config_data:
          policy_type: numbered
          template_inputs:
            src_ip: 10.99.32.1
            dst_ip: 10.99.32.2
            mtu: 9216
            interface_admin_state: true
    state: merged
  check_mode: true
  register: cm_merged_create_links

- name: Create three numbered links (merged state - normal mode)
  cisco.nd.nd_links:
    <<: *create_links_merged_state
  register: nm_merged_create_links

- name: Create same links again (merged state - idempotency)
  cisco.nd.nd_links:
    <<: *create_links_merged_state
  register: nm_merged_create_links_again

- name: Asserts for links merged state creation tasks
  ansible.builtin.assert:
    that:
      - cm_merged_create_links is changed
      - cm_merged_create_links.proposed | length == 3
      - cm_merged_create_links.proposed.0.config_data.policy_type == "numbered"
      - cm_merged_create_links.proposed.0.config_data.template_inputs.src_ip == "10.99.30.1"
      - cm_merged_create_links.proposed.0.config_data.template_inputs.dst_ip == "10.99.30.2"
      - cm_merged_create_links.proposed.0.config_data.template_inputs.mtu == 9216
      - cm_merged_create_links.proposed.0.src_interface_name == "Ethernet1/30"
      - cm_merged_create_links.proposed.1.config_data.template_inputs.src_ip == "10.99.31.1"
      - cm_merged_create_links.proposed.1.src_interface_name == "Ethernet1/31"
      - cm_merged_create_links.proposed.2.config_data.template_inputs.src_ip == "10.99.32.1"
      - cm_merged_create_links.proposed.2.src_interface_name == "Ethernet1/32"

      - nm_merged_create_links is changed
      - nm_merged_create_links.proposed | length == 3
      - (nm_merged_create_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | list) | length == 1
      - (nm_merged_create_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/31') | list) | length == 1
      - (nm_merged_create_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/32') | list) | length == 1
      - (nm_merged_create_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.policy_type == "numbered"
      - (nm_merged_create_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.src_ip == "10.99.30.1"
      - (nm_merged_create_links.after | selectattr('src_interface_name', 'eq', 'Ethernet1/30') | first).config_data.template_inputs.mtu == 9216

      - nm_merged_create_links_again is not changed
