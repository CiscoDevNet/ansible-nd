  register: replaced_fabric_query
  tags: [test_replaced, test_replaced_validation]
  delegate_to: localhost

- name: "VALIDATION 2: Parse fabric configuration response"
  set_fact:
    replaced_fabric_config: "{{ replaced_fabric_query.json }}"
  tags: [test_replaced, test_replaced_validation]

# Network Range Validations
- name: "VALIDATION 2: Verify L3 VNI Range was standardized to 50000-59000"
  assert:
    that:
      - replaced_fabric_config.management.l3VniRange == "50000-59000"
    fail_msg: "L3 VNI Range validation failed. Expected: 50000-59000, Actual: {{ replaced_fabric_config.management.l3VniRange }}"
