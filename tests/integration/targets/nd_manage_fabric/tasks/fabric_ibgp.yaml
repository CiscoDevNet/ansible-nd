#############################################################################
# TEST 3: Demonstrate difference between merged and replaced states
#############################################################################
- name: "TEST 3: Create fabric for merged vs replaced comparison"
  cisco.nd.nd_manage_fabric_ibgp:
    state: replaced
    config:
      - "{{ {'name': test_fabric_deleted} | combine(fabric_config_ibgp) }}"
  register: comparison_fabric_creation
  tags: [test_comparison]

- name: "TEST 3a: Partial update using merged state (should merge changes)"
  cisco.nd.nd_manage_fabric_ibgp:
    state: merged
    config:
      - name: "{{ test_fabric_deleted }}"
        category: fabric
        management:
          bgp_asn: "65099"  # Only updating ASN
          fabric_mtu: 8000  # Only updating MTU
  register: merged_partial_result
  tags: [test_comparison, test_merged_partial]

- name: "TEST 3a: Verify merged state preserves existing configuration"
  assert:
    that:
      - merged_partial_result is changed
      - merged_partial_result is not failed
    fail_msg: "Partial update with merged state failed"
    success_msg: "Merged state successfully performed partial update"
  tags: [test_comparison, test_merged_partial]

- name: "TEST 3b: Partial update using replaced state (should replace entire config)"
  cisco.nd.nd_manage_fabric_ibgp:
    state: replaced
    config:
      - name: "{{ test_fabric_deleted }}"
        category: fabric
        management:
          type: vxlanIbgp
          bgp_asn: "65100"  # Only specifying minimal config for replaced
          target_subnet_mask: 30
  register: replaced_partial_result
  tags: [test_comparison, test_replaced_partial]

- name: "TEST 3b: Verify replaced state performs complete replacement"
  assert:
    that:
      - replaced_partial_result is changed
      - replaced_partial_result is not failed
    fail_msg: "Partial replacement with replaced state failed"
    success_msg: "Replaced state successfully performed complete replacement"
  tags: [test_comparison, test_replaced_partial]

#############################################################################
# TEST 4: STATE DELETED - Delete fabrics
#############################################################################
- name: "TEST 4a: Delete fabric using state deleted"
  cisco.nd.nd_manage_fabric_ibgp:
    state: deleted
    config:
      - name: "{{ test_fabric_deleted }}"
  register: deleted_result_1
  tags: [test_deleted, test_deleted_delete]

- name: "TEST 4a: Verify fabric was deleted"
  assert:
    that:
      - deleted_result_1 is changed
      - deleted_result_1 is not failed
    fail_msg: "Fabric deletion with state deleted failed"
    success_msg: "Fabric successfully deleted with state deleted"
  tags: [test_deleted, test_deleted_delete]

- name: "TEST 4b: Delete fabric using state deleted (second run - idempotency test)"
  cisco.nd.nd_manage_fabric_ibgp:
    state: deleted
    config:
      - name: "{{ test_fabric_deleted }}"
  register: deleted_result_2
  tags: [test_deleted, test_deleted_idempotent]

- name: "TEST 4b: Verify deleted state is idempotent"
  assert:
    that:
      - deleted_result_2 is not changed
      - deleted_result_2 is not failed
    fail_msg: "Deleted state is not idempotent - should not change when deleting non-existent fabric"
    success_msg: "Deleted state is idempotent - no changes when deleting non-existent fabric"
  tags: [test_deleted, test_deleted_idempotent]

