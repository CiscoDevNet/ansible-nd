# Get authentication token first
- name: "VALIDATION 2: Authenticate with ND to get token"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/login"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      domain: "{{ ansible_httpapi_login_domain | default('local') }}"
      userName: "{{ ansible_user }}"
      userPasswd: "{{ ansible_password }}"
    validate_certs: false
    return_content: true
    status_code:
      - 200
  register: nd_auth_response_2
  tags: [test_replaced, test_replaced_validation]
  delegate_to: localhost

- name: "VALIDATION 2: Query test_fabric_replaced configuration from ND"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/api/v1/manage/fabrics/{{ test_fabric_replaced }}"
    method: GET
    headers:
      Authorization: "Bearer {{ nd_auth_response_2.json.jwttoken }}"
      Content-Type: "application/json"
    validate_certs: false
    return_content: true
    status_code:
      - 200
      - 404
  register: replaced_fabric_query
  tags: [test_replaced, test_replaced_validation]
  delegate_to: localhost

- name: "VALIDATION 2: Parse fabric configuration response"
  set_fact:
    replaced_fabric_config: "{{ replaced_fabric_query.json }}"
  tags: [test_replaced, test_replaced_validation]

# Network Range Validations
#
# Category 1: Properties explicitly specified in TEST 2c replace task
#
- name: "VALIDATION 2a: Verify explicitly specified properties in replace"
  assert:
