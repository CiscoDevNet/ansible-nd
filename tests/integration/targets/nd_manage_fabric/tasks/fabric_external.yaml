      Content-Type: "application/json"
    body_format: json
    body:
      domain: "{{ ansible_httpapi_login_domain | default('local') }}"
      userName: "{{ ansible_user }}"
      userPasswd: "{{ ansible_password }}"
    validate_certs: false
    return_content: true
    status_code:
      - 200
  register: nd_auth_response_2
  tags: [test_replaced, test_replaced_validation]
  delegate_to: localhost

- name: "VALIDATION 2: Query ext_test_fabric_replaced configuration from ND"
  ansible.builtin.uri:
