  tags: [test_replaced, test_replaced_validation]

#############################################################################
# TEST 3: Demonstrate difference between merged and replaced states
#############################################################################
- name: "TEST 3: Create fabric for merged vs replaced comparison"
  cisco.nd.nd_manage_fabric_external:
    state: replaced
    config:
      - "{{ {'name': ext_test_fabric_deleted} | combine(fabric_config_external) }}"
  register: ext_comparison_fabric_creation
  tags: [test_comparison]

- name: "TEST 3a: Partial update using merged state (should merge changes)"
  cisco.nd.nd_manage_fabric_external:
    state: merged
    config:
      - name: "{{ ext_test_fabric_deleted }}"
        category: fabric
        management:
          bgp_asn: "65099"  # Only updating ASN
          copp_policy: strict  # Only updating CoPP policy
  register: ext_merged_partial_result
  tags: [test_comparison, test_merged_partial]

- name: "TEST 3a: Verify merged state preserves existing configuration"
  assert:
    that:
      - ext_merged_partial_result is changed
      - ext_merged_partial_result is not failed
    fail_msg: "Partial update with merged state failed"
    success_msg: "Merged state successfully performed partial update"
  tags: [test_comparison, test_merged_partial]

- name: "TEST 3b: Partial update using replaced state (should replace entire config)"
  cisco.nd.nd_manage_fabric_external:
    state: replaced
    config:
      - name: "{{ ext_test_fabric_deleted }}"
        category: fabric
        management:
          type: externalConnectivity
          bgp_asn: "65100"  # Only specifying minimal config for replaced
  register: ext_replaced_partial_result
  tags: [test_comparison, test_replaced_partial]

- name: "TEST 3b: Verify replaced state performs complete replacement"
  assert:
    that:
      - ext_replaced_partial_result is changed
      - ext_replaced_partial_result is not failed
    fail_msg: "Partial replacement with replaced state failed"
    success_msg: "Replaced state successfully performed complete replacement"
  tags: [test_comparison, test_replaced_partial]

#############################################################################
# TEST 4: STATE DELETED - Delete fabrics
#############################################################################
- name: "TEST 4a: Delete fabric using state deleted"
  cisco.nd.nd_manage_fabric_external:
    state: deleted
    config:
      - name: "{{ ext_test_fabric_deleted }}"
  register: ext_deleted_result_1
