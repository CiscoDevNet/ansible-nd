          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: externalConnectivity
          bgp_asn: "65004"
          copp_policy: strict  # Different from default
          create_bgp_config: true
          cdp: true  # Different from default
          snmp_trap: false  # Different from default
          nxapi: true  # Different from default
          nxapi_http: true  # Different from default
          nxapi_https_port: 443
          nxapi_http_port: 80
          performance_monitoring: true  # Different from default
          real_time_interface_statistics_collection: true  # Different from default
          interface_statistics_load_interval: 30  # Different from default
          sub_interface_dot1q_range: "2-511"
          power_redundancy_mode: combined  # Different from default
          ptp: true  # Different from default
          ptp_domain_id: 10  # Different from default
          ptp_loopback_id: 5  # Different from default
          mpls_handoff: false
          mpls_loopback_ip_range: "10.102.0.0/25"
          day0_bootstrap: false
          local_dhcp_server: false
          dhcp_protocol_version: dhcpv4
          dhcp_start_address: ""
          dhcp_end_address: ""
          management_gateway: ""
          management_ipv4_prefix: 24
          management_ipv6_prefix: 64
          extra_config_aaa: ""
          extra_config_fabric: ""
  register: ext_replaced_result_1
  tags: [test_replaced, test_replaced_create]

- name: "TEST 2a: Verify fabric was created using replaced state"
  assert:
    that:
      - ext_replaced_result_1 is changed
      - ext_replaced_result_1 is not failed
    fail_msg: "Fabric creation with state replaced failed"
    success_msg: "Fabric successfully created with state replaced"
  tags: [test_replaced, test_replaced_create]

- name: "TEST 2b: Create fabric using state replaced (second run - idempotency test)"
  cisco.nd.nd_manage_fabric_external:
    state: replaced
    config:
      - name: "{{ ext_test_fabric_replaced }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: externalConnectivity
          bgp_asn: "65004"
          copp_policy: strict
          create_bgp_config: true
          cdp: true
          snmp_trap: false
          nxapi: true
          nxapi_http: true
          nxapi_https_port: 443
          nxapi_http_port: 80
          performance_monitoring: true
          real_time_interface_statistics_collection: true
          interface_statistics_load_interval: 30
          sub_interface_dot1q_range: "2-511"
          power_redundancy_mode: combined
          ptp: true
          ptp_domain_id: 10
          ptp_loopback_id: 5
          mpls_handoff: false
          mpls_loopback_ip_range: "10.102.0.0/25"
          day0_bootstrap: false
          local_dhcp_server: false
          dhcp_protocol_version: dhcpv4
          dhcp_start_address: ""
          dhcp_end_address: ""
          management_gateway: ""
          management_ipv4_prefix: 24
          management_ipv6_prefix: 64
          extra_config_aaa: ""
          extra_config_fabric: ""
  register: ext_replaced_result_2
  tags: [test_replaced, test_replaced_idempotent]

- name: "TEST 2b: Verify replaced state is idempotent"
  assert:
    that:
      - ext_replaced_result_2 is not changed
      - ext_replaced_result_2 is not failed
    fail_msg: "Replaced state is not idempotent - should not change when run twice with same config"
    success_msg: "Replaced state is idempotent - no changes on second run"
  tags: [test_replaced, test_replaced_idempotent]

- name: "TEST 2c: Update fabric using state replaced (complete replacement with minimal config)"
  cisco.nd.nd_manage_fabric_external:
    state: replaced
    config:
      - name: "{{ ext_test_fabric_replaced }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: externalConnectivity
          bgp_asn: "65004"
  register: ext_replaced_result_3
  tags: [test_replaced, test_replaced_update]

- name: "TEST 2c: Verify fabric was completely replaced"
  assert:
    that:
      - ext_replaced_result_3 is changed
      - ext_replaced_result_3 is not failed
    fail_msg: "Fabric replacement with state replaced failed"
    success_msg: "Fabric successfully replaced with state replaced"
  tags: [test_replaced, test_replaced_update]

#############################################################################
