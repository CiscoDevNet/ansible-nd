- name: Test that we have a Nexus Dashboard host, username and password
  ansible.builtin.fail:
    msg: 'Please define the following variables: ansible_host, ansible_user and ansible_password.'
  when: ansible_host is not defined or ansible_user is not defined or ansible_password is not defined

#############################################################################
# CLEANUP - Ensure clean state before tests
#############################################################################
- name: Clean up any existing test fabrics before starting tests
  cisco.nd.nd_manage_fabric_external:
    state: deleted
    config:
      - name: "{{ ext_test_fabric_merged }}"
      - name: "{{ ext_test_fabric_replaced }}"
      - name: "{{ ext_test_fabric_deleted }}"
  tags: always

#############################################################################
# TEST 1: STATE MERGED - Create fabric using merged state
#############################################################################
- name: "TEST 1a: Create fabric using state merged (first run)"
  cisco.nd.nd_manage_fabric_external:
    state: merged
    config:
      - "{{ {'name': ext_test_fabric_merged} | combine(fabric_config_external) }}"
  register: ext_merged_result_1
  tags: [test_merged, test_merged_create]

- name: "TEST 1a: Verify fabric was created using merged state"
  assert:
    that:
      - ext_merged_result_1 is changed
      - ext_merged_result_1 is not failed
    fail_msg: "Fabric creation with state merged failed"
    success_msg: "Fabric successfully created with state merged"
  tags: [test_merged, test_merged_create]

- name: "TEST 1b: Create fabric using state merged (second run - idempotency test)"
  cisco.nd.nd_manage_fabric_external:
    state: merged
    config:
      - "{{ {'name': ext_test_fabric_merged} | combine(fabric_config_external) }}"
  register: ext_merged_result_2
  tags: [test_merged, test_merged_idempotent]

- name: "TEST 1b: Verify merged state is idempotent"
  assert:
    that:
      - ext_merged_result_2 is not changed
      - ext_merged_result_2 is not failed
    fail_msg: "Merged state is not idempotent - should not change when run twice with same config"
    success_msg: "Merged state is idempotent - no changes on second run"
  tags: [test_merged, test_merged_idempotent]

- name: "TEST 1c: Update fabric using state merged (modify existing)"
  cisco.nd.nd_manage_fabric_external:
    state: merged
    config:
      - name: "{{ ext_test_fabric_merged }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: externalConnectivity
          bgp_asn: "65002"  # Changed from 65001
          copp_policy: strict  # Changed from manual
          create_bgp_config: true
          cdp: true  # Changed from false
          snmp_trap: false  # Changed from true
          nxapi: true  # Changed from false
          nxapi_http: true  # Changed from false
          nxapi_https_port: 443
          nxapi_http_port: 80
          performance_monitoring: true  # Changed from false
          real_time_interface_statistics_collection: true  # Changed from false
          interface_statistics_load_interval: 30  # Changed from 10
          sub_interface_dot1q_range: "2-511"
          power_redundancy_mode: combined  # Changed from redundant
          day0_bootstrap: false
          local_dhcp_server: false
          dhcp_protocol_version: dhcpv4
          dhcp_start_address: ""
          dhcp_end_address: ""
          management_gateway: ""
          management_ipv4_prefix: 24
  register: ext_merged_result_3
  tags: [test_merged, test_merged_update]

- name: "TEST 1c: Verify fabric was updated using merged state"
  assert:
    that:
      - ext_merged_result_3 is changed
      - ext_merged_result_3 is not failed
    fail_msg: "Fabric update with state merged failed"
    success_msg: "Fabric successfully updated with state merged"
  tags: [test_merged, test_merged_update]

#############################################################################
# VALIDATION: Query ext_test_fabric_merged and validate expected changes
#############################################################################
- name: "VALIDATION 1: Authenticate with ND to get token"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/login"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      domain: "{{ ansible_httpapi_login_domain | default('local') }}"
      userName: "{{ ansible_user }}"
      userPasswd: "{{ ansible_password }}"
    validate_certs: false
    return_content: true
    status_code:
      - 200
  register: nd_auth_response
  tags: [test_merged, test_merged_validation]
  delegate_to: localhost

- name: "VALIDATION 1: Query ext_test_fabric_merged configuration from ND"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/api/v1/manage/fabrics/{{ ext_test_fabric_merged }}"
    method: GET
    headers:
      Authorization: "Bearer {{ nd_auth_response.json.jwttoken }}"
      Content-Type: "application/json"
    validate_certs: false
    return_content: true
    status_code:
      - 200
      - 404
  register: ext_merged_fabric_query
  tags: [test_merged, test_merged_validation]
  delegate_to: localhost

- name: "VALIDATION 1: Parse fabric configuration response"
  set_fact:
    ext_merged_fabric_config: "{{ ext_merged_fabric_query.json }}"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify BGP ASN was updated to 65002"
  assert:
    that:
      - ext_merged_fabric_config.management.bgpAsn == "65002"
    fail_msg: "BGP ASN validation failed. Expected: 65002, Actual: {{ ext_merged_fabric_config.management.bgpAsn }}"
    success_msg: "✓ BGP ASN correctly updated to 65002"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify CoPP Policy was updated to strict"
  assert:
    that:
      - ext_merged_fabric_config.management.coppPolicy == "strict"
    fail_msg: "CoPP Policy validation failed. Expected: strict, Actual: {{ ext_merged_fabric_config.management.coppPolicy }}"
    success_msg: "✓ CoPP Policy correctly updated to strict"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify Performance Monitoring was enabled"
  assert:
    that:
      - ext_merged_fabric_config.management.performanceMonitoring == true
    fail_msg: "Performance Monitoring validation failed. Expected: true, Actual: {{ ext_merged_fabric_config.management.performanceMonitoring }}"
    success_msg: "✓ Performance Monitoring correctly enabled"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify CDP was enabled"
  assert:
    that:
      - ext_merged_fabric_config.management.cdp == true
    fail_msg: "CDP validation failed. Expected: true, Actual: {{ ext_merged_fabric_config.management.cdp }}"
    success_msg: "✓ CDP correctly enabled"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Display successful validation summary for ext_test_fabric_merged"
  debug:
    msg: |
      ========================================
      VALIDATION SUMMARY for ext_test_fabric_merged:
      ========================================
      ✓ BGP ASN: {{ ext_merged_fabric_config.management.bgpAsn }}
      ✓ CoPP Policy: {{ ext_merged_fabric_config.management.coppPolicy }}
      ✓ Performance Monitoring: {{ ext_merged_fabric_config.management.performanceMonitoring }}
      ✓ CDP: {{ ext_merged_fabric_config.management.cdp }}

      All 4 expected changes validated successfully!
      ========================================
  tags: [test_merged, test_merged_validation]

#############################################################################
# TEST 2: STATE REPLACED - Create and manage fabric using replaced state
#############################################################################
- name: "TEST 2a: Create fabric using state replaced (first run)"
  cisco.nd.nd_manage_fabric_external:
    state: replaced
    config:
      - name: "{{ ext_test_fabric_replaced }}"
