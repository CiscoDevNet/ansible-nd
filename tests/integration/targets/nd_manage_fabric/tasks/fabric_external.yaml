#############################################################################
# FINAL CLEANUP - Clean up all test fabrics
#############################################################################
- name: "CLEANUP: Delete all test fabrics"
  cisco.nd.nd_manage_fabric_external:
    state: deleted
    config:
      - name: "{{ ext_test_fabric_merged }}"
      - name: "{{ ext_test_fabric_replaced }}"
      - name: "{{ ext_test_fabric_deleted }}"
      - name: "ext_multi_fabric_1"
      - name: "ext_multi_fabric_2"
