      - replaced_fabric_config.management.nveLoopbackIpRange == "10.3.0.0/22"
      - replaced_fabric_config.management.l2VniRange == "30000-49000"
      - replaced_fabric_config.management.l3VniRange == "50000-59000"
    fail_msg: >-
      Properties not specified in replace task must revert to defaults.
    success_msg: "All 15 unspecified properties correctly reverted to defaults"
  tags: [test_replaced, test_replaced_validation]

