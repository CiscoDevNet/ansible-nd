    that:
      - replaced_fabric_config.management.bgpAsn == "65004"
      - replaced_fabric_config.management.siteId == "65004"
      - replaced_fabric_config.management.banner == "^ AI iBGP Updated via replaced state ^"
    fail_msg: >-
      Explicitly specified properties validation failed.
    success_msg: "All 3 explicitly specified properties set correctly"
  tags: [test_replaced, test_replaced_validation]

- name: "VALIDATION 2c: Verify properties reverted to defaults after replace"
  assert:
    that:
      - replaced_fabric_config.management.anycastGatewayMac == "2020.0000.00aa"
      - replaced_fabric_config.management.performanceMonitoring == false
      - replaced_fabric_config.management.fabricMtu == 9216
      - replaced_fabric_config.management.l2HostInterfaceMtu == 9216
