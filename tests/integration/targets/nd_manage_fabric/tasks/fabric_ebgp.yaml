- name: Test that we have a Nexus Dashboard host, username and password
  ansible.builtin.fail:
    msg: 'Please define the following variables: ansible_host, ansible_user and ansible_password.'
  when: ansible_host is not defined or ansible_user is not defined or ansible_password is not defined

- name: Set vars
  ansible.builtin.set_fact:
    nd_info: &nd_info
      output_level: '{{ api_key_output_level | default("debug") }}'

#############################################################################
# CLEANUP - Ensure clean state before tests
#############################################################################
- name: Clean up any existing test fabrics before starting tests
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: deleted
    config:
      - fabric_name: "{{ ebgp_test_fabric_merged }}"
      - fabric_name: "{{ ebgp_test_fabric_replaced }}"
      - fabric_name: "{{ ebgp_test_fabric_deleted }}"
  tags: always

#############################################################################
# TEST 1: STATE MERGED - Create fabric using merged state
#############################################################################
- name: "TEST 1a: Create eBGP fabric using state merged (first run)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: merged
    config:
      - "{{ {'fabric_name': ebgp_test_fabric_merged} | combine(fabric_config_ebgp) }}"
  register: ebgp_merged_result_1
  tags: [test_merged, test_merged_create]

- name: "TEST 1a: Verify eBGP fabric was created using merged state"
  assert:
    that:
      - ebgp_merged_result_1 is changed
      - ebgp_merged_result_1 is not failed
    fail_msg: "eBGP fabric creation with state merged failed"
    success_msg: "eBGP fabric successfully created with state merged"
  tags: [test_merged, test_merged_create]

- name: "TEST 1b: Create eBGP fabric using state merged (second run - idempotency test)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: merged
    config:
      - "{{ {'fabric_name': ebgp_test_fabric_merged} | combine(fabric_config_ebgp) }}"
  register: ebgp_merged_result_2
  tags: [test_merged, test_merged_idempotent]

- name: "TEST 1b: Verify merged state is idempotent"
  assert:
    that:
      - ebgp_merged_result_2 is not changed
      - ebgp_merged_result_2 is not failed
    fail_msg: "Merged state is not idempotent - should not change when run twice with same config"
    success_msg: "Merged state is idempotent - no changes on second run"
  tags: [test_merged, test_merged_idempotent]

- name: "TEST 1c: Update eBGP fabric using state merged (modify existing)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: merged
    config:
      - fabric_name: "{{ ebgp_test_fabric_merged }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: vxlanEbgp
          bgp_asn: "65002"           # Changed from 65001
          bgp_asn_auto_allocation: false
          site_id: "65002"           # Changed from 65001
          bgp_as_mode: multiAS
          bgp_allow_as_in_num: 1
          bgp_max_path: 4
          auto_configure_ebgp_evpn_peering: true
          target_subnet_mask: 30
          anycast_gateway_mac: "2020.0000.00bb"  # Changed from 00aa
          performance_monitoring: true            # Changed from false
          replication_mode: multicast
          multicast_group_subnet: "239.1.1.0/25"
          auto_generate_multicast_group_address: false
          underlay_multicast_group_address_limit: 128
          tenant_routed_multicast: false
          rendezvous_point_count: 2
          rendezvous_point_loopback_id: 254
          vpc_peer_link_vlan: "3600"
          vpc_peer_link_enable_native_vlan: false
          vpc_peer_keep_alive_option: management
          vpc_auto_recovery_timer: 360
          vpc_delay_restore_timer: 150
          vpc_peer_link_port_channel_id: "500"
          advertise_physical_ip: false
          vpc_domain_id_range: "1-1000"
          bgp_loopback_id: 0
          nve_loopback_id: 1
          vrf_template: Default_VRF_Universal
          network_template: Default_Network_Universal
          vrf_extension_template: Default_VRF_Extension_Universal
          network_extension_template: Default_Network_Extension_Universal
          l3_vni_no_vlan_default_option: false
          fabric_mtu: 9216
          l2_host_interface_mtu: 9216
          tenant_dhcp: true
          nxapi: false
          nxapi_https_port: 443
          nxapi_http: false
          nxapi_http_port: 80
          snmp_trap: true
          anycast_border_gateway_advertise_physical_ip: false
          greenfield_debug_flag: disable
          tcam_allocation: true
          real_time_interface_statistics_collection: false
          interface_statistics_load_interval: 10
          bgp_loopback_ip_range: "10.2.0.0/22"
          nve_loopback_ip_range: "10.3.0.0/22"
          anycast_rendezvous_point_ip_range: "10.254.254.0/24"
          intra_fabric_subnet_range: "10.4.0.0/16"
          l2_vni_range: "30000-49000"
          l3_vni_range: "50000-59000"
          network_vlan_range: "2300-2999"
          vrf_vlan_range: "2000-2299"
          sub_interface_dot1q_range: "2-511"
          vrf_lite_auto_config: manual
          vrf_lite_subnet_range: "10.33.0.0/16"
          vrf_lite_subnet_target_mask: 30
          auto_unique_vrf_lite_ip_prefix: false
          per_vrf_loopback_auto_provision: true
          per_vrf_loopback_ip_range: "10.5.0.0/22"
          banner: ""
          day0_bootstrap: false
          local_dhcp_server: false
          dhcp_protocol_version: dhcpv4
          dhcp_start_address: ""
          dhcp_end_address: ""
          management_gateway: ""
          management_ipv4_prefix: 24
  register: ebgp_merged_result_3
  tags: [test_merged, test_merged_update]

- name: "TEST 1c: Verify eBGP fabric was updated using merged state"
  assert:
    that:
      - ebgp_merged_result_3 is changed
      - ebgp_merged_result_3 is not failed
    fail_msg: "eBGP fabric update with state merged failed"
    success_msg: "eBGP fabric successfully updated with state merged"
  tags: [test_merged, test_merged_update]

#############################################################################
# VALIDATION: Query ebgp_test_fabric_merged and validate expected changes
#############################################################################
- name: "VALIDATION 1: Authenticate with ND to get token"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/login"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      domain: "{{ ansible_httpapi_login_domain | default('local') }}"
      userName: "{{ ansible_user }}"
      userPasswd: "{{ ansible_password }}"
    validate_certs: false
    return_content: true
    status_code:
      - 200
  register: nd_auth_response
  tags: [test_merged, test_merged_validation]
  delegate_to: localhost

- name: "VALIDATION 1: Query ebgp_test_fabric_merged configuration from ND"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/api/v1/manage/fabrics/{{ ebgp_test_fabric_merged }}"
    method: GET
    headers:
      Authorization: "Bearer {{ nd_auth_response.json.jwttoken }}"
      Content-Type: "application/json"
    validate_certs: false
    return_content: true
    status_code:
      - 200
      - 404
  register: ebgp_merged_fabric_query
  tags: [test_merged, test_merged_validation]
  delegate_to: localhost

- name: "VALIDATION 1: Parse eBGP fabric configuration response"
  set_fact:
    ebgp_merged_fabric_config: "{{ ebgp_merged_fabric_query.json }}"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify BGP ASN was updated to 65002"
  assert:
    that:
      - ebgp_merged_fabric_config.management.bgpAsn == "65002"
    fail_msg: "BGP ASN validation failed. Expected: 65002, Actual: {{ ebgp_merged_fabric_config.management.bgpAsn }}"
    success_msg: "✓ BGP ASN correctly updated to 65002"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify Site ID was updated to 65002"
  assert:
    that:
      - ebgp_merged_fabric_config.management.siteId == "65002"
    fail_msg: "Site ID validation failed. Expected: 65002, Actual: {{ ebgp_merged_fabric_config.management.siteId }}"
    success_msg: "✓ Site ID correctly updated to 65002"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify Anycast Gateway MAC was updated to 2020.0000.00bb"
  assert:
    that:
      - ebgp_merged_fabric_config.management.anycastGatewayMac == "2020.0000.00bb"
    fail_msg: "Anycast Gateway MAC validation failed. Expected: 2020.0000.00bb, Actual: {{ ebgp_merged_fabric_config.management.anycastGatewayMac }}"
    success_msg: "✓ Anycast Gateway MAC correctly updated to 2020.0000.00bb"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify Performance Monitoring was enabled"
  assert:
    that:
      - ebgp_merged_fabric_config.management.performanceMonitoring == true
    fail_msg: "Performance Monitoring validation failed. Expected: true, Actual: {{ ebgp_merged_fabric_config.management.performanceMonitoring }}"
    success_msg: "✓ Performance Monitoring correctly enabled"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Verify BGP AS Mode is multiAS"
  assert:
    that:
      - ebgp_merged_fabric_config.management.bgpAsMode == "multiAS"
    fail_msg: "BGP AS Mode validation failed. Expected: multiAS, Actual: {{ ebgp_merged_fabric_config.management.bgpAsMode }}"
    success_msg: "✓ BGP AS Mode correctly set to multiAS"
  tags: [test_merged, test_merged_validation]

- name: "VALIDATION 1: Display successful validation summary for ebgp_test_fabric_merged"
  debug:
    msg: |
      ========================================
      VALIDATION SUMMARY for ebgp_test_fabric_merged:
      ========================================
      ✓ BGP ASN: {{ ebgp_merged_fabric_config.management.bgpAsn }}
      ✓ Site ID: {{ ebgp_merged_fabric_config.management.siteId }}
      ✓ Anycast Gateway MAC: {{ ebgp_merged_fabric_config.management.anycastGatewayMac }}
      ✓ Performance Monitoring: {{ ebgp_merged_fabric_config.management.performanceMonitoring }}
      ✓ BGP AS Mode: {{ ebgp_merged_fabric_config.management.bgpAsMode }}

      All 5 expected changes validated successfully!
      ========================================
  tags: [test_merged, test_merged_validation]

#############################################################################
# TEST 2: STATE REPLACED - Create and manage fabric using replaced state
#############################################################################
- name: "TEST 2a: Create eBGP fabric using state replaced (first run)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: replaced
    config:
      - fabric_name: "{{ ebgp_test_fabric_replaced }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: vxlanEbgp
          bgp_asn: "65004"              # Different from default ASN
          bgp_asn_auto_allocation: true
          bgp_asn_range: "65000-65100"
          site_id: "65004"              # Different from default site_id
          bgp_as_mode: multiAS          # Different from default multiAS
          bgp_allow_as_in_num: 2        # Different from default 1
          bgp_max_path: 8               # Different from default 4
          auto_configure_ebgp_evpn_peering: true
          target_subnet_mask: 30
          anycast_gateway_mac: "2020.0000.00dd"  # Different from default MAC
          performance_monitoring: true            # Different from default false
          replication_mode: multicast
          multicast_group_subnet: "239.1.3.0/25"  # Different from default subnet
          auto_generate_multicast_group_address: false
          underlay_multicast_group_address_limit: 128
          tenant_routed_multicast: false
          rendezvous_point_count: 4               # Different from default 2
          rendezvous_point_loopback_id: 253        # Different from default 254
          vpc_peer_link_vlan: "3700"              # Different from default 3600
          vpc_peer_link_enable_native_vlan: false
          vpc_peer_keep_alive_option: management
          vpc_auto_recovery_timer: 300            # Different from default 360
          vpc_delay_restore_timer: 120            # Different from default 150
          vpc_peer_link_port_channel_id: "600"   # Different from default 500
          vpc_ipv6_neighbor_discovery_sync: false  # Different from default true
          advertise_physical_ip: true             # Different from default false
          vpc_domain_id_range: "1-800"            # Different from default 1-1000
          bgp_loopback_id: 0
          nve_loopback_id: 1
          vrf_template: Default_VRF_Universal
          network_template: Default_Network_Universal
          vrf_extension_template: Default_VRF_Extension_Universal
          network_extension_template: Default_Network_Extension_Universal
