          fabric_mtu: 9000              # Different from default 9216
          l2_host_interface_mtu: 9000  # Different from default 9216
          tenant_dhcp: false            # Different from default true
          nxapi: false
          nxapi_https_port: 443
          nxapi_http: true              # Different from default false
          nxapi_http_port: 80
          snmp_trap: false              # Different from default true
          anycast_border_gateway_advertise_physical_ip: true  # Different from default false
          greenfield_debug_flag: enable  # Different from default disable
          tcam_allocation: false        # Different from default true
          real_time_interface_statistics_collection: true   # Different from default false
          interface_statistics_load_interval: 30  # Different from default 10
          bgp_loopback_ip_range: "10.22.0.0/22"   # Different from default range
          nve_loopback_ip_range: "10.23.0.0/22"   # Different from default range
          anycast_rendezvous_point_ip_range: "10.254.252.0/24"  # Different from default range
          intra_fabric_subnet_range: "10.24.0.0/16"             # Different from default range
          l2_vni_range: "40000-59000"  # Different from default range
          l3_vni_range: "60000-69000"  # Different from default range
          network_vlan_range: "2400-3099"  # Different from default range
          vrf_vlan_range: "2100-2399"      # Different from default range
          sub_interface_dot1q_range: "2-511"
          vrf_lite_auto_config: manual
          vrf_lite_subnet_range: "10.53.0.0/16"  # Different from default range
          vrf_lite_subnet_target_mask: 30
          auto_unique_vrf_lite_ip_prefix: false
          per_vrf_loopback_auto_provision: true
          per_vrf_loopback_ip_range: "10.25.0.0/22"   # Different from default range
          per_vrf_loopback_auto_provision_ipv6: true
          per_vrf_loopback_ipv6_range: "fd00::a25:0/112"  # Different from default range
          banner: "^ Updated via replaced state ^"
          day0_bootstrap: false
          local_dhcp_server: false
          dhcp_protocol_version: dhcpv4
          dhcp_start_address: ""
          dhcp_end_address: ""
          management_gateway: ""
          management_ipv4_prefix: 24
          management_ipv6_prefix: 64
  register: ebgp_replaced_result_1
  tags: [test_replaced, test_replaced_create]

- name: "TEST 2a: Verify eBGP fabric was created using replaced state"
  assert:
    that:
      - ebgp_replaced_result_1 is changed
      - ebgp_replaced_result_1 is not failed
    fail_msg: "eBGP fabric creation with state replaced failed"
    success_msg: "eBGP fabric successfully created with state replaced"
  tags: [test_replaced, test_replaced_create]

- name: "TEST 2b: Create eBGP fabric using state replaced (second run - idempotency test)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: replaced
    config:
      - fabric_name: "{{ ebgp_test_fabric_replaced }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: vxlanEbgp
          bgp_asn: "65004"              # Different from default ASN
          bgp_asn_auto_allocation: true
          bgp_asn_range: "65000-65100"
          site_id: "65004"
          bgp_as_mode: multiAS          # Different from default multiAS
          bgp_allow_as_in_num: 2
          bgp_max_path: 8
          auto_configure_ebgp_evpn_peering: true
          target_subnet_mask: 30
          anycast_gateway_mac: "2020.0000.00dd"
          performance_monitoring: true
          replication_mode: multicast
          multicast_group_subnet: "239.1.3.0/25"
          auto_generate_multicast_group_address: false
          underlay_multicast_group_address_limit: 128
          tenant_routed_multicast: false
          rendezvous_point_count: 4
          rendezvous_point_loopback_id: 253
          vpc_peer_link_vlan: "3700"
          vpc_peer_link_enable_native_vlan: false
          vpc_peer_keep_alive_option: management
          vpc_auto_recovery_timer: 300
          vpc_delay_restore_timer: 120
          vpc_peer_link_port_channel_id: "600"
          vpc_ipv6_neighbor_discovery_sync: false
          advertise_physical_ip: true
          vpc_domain_id_range: "1-800"
          bgp_loopback_id: 0
          nve_loopback_id: 1
          vrf_template: Default_VRF_Universal
          network_template: Default_Network_Universal
          vrf_extension_template: Default_VRF_Extension_Universal
          network_extension_template: Default_Network_Extension_Universal
          l3_vni_no_vlan_default_option: false
          fabric_mtu: 9000
          l2_host_interface_mtu: 9000
          tenant_dhcp: false
          nxapi: false
          nxapi_https_port: 443
          nxapi_http: true
          nxapi_http_port: 80
          snmp_trap: false
          anycast_border_gateway_advertise_physical_ip: true
          greenfield_debug_flag: enable
          tcam_allocation: false
          real_time_interface_statistics_collection: true
          interface_statistics_load_interval: 30
          bgp_loopback_ip_range: "10.22.0.0/22"
          nve_loopback_ip_range: "10.23.0.0/22"
          anycast_rendezvous_point_ip_range: "10.254.252.0/24"
          intra_fabric_subnet_range: "10.24.0.0/16"
          l2_vni_range: "40000-59000"
          l3_vni_range: "60000-69000"
          network_vlan_range: "2400-3099"
          vrf_vlan_range: "2100-2399"
          sub_interface_dot1q_range: "2-511"
          vrf_lite_auto_config: manual
          vrf_lite_subnet_range: "10.53.0.0/16"
          vrf_lite_subnet_target_mask: 30
          auto_unique_vrf_lite_ip_prefix: false
          per_vrf_loopback_auto_provision: true
          per_vrf_loopback_ip_range: "10.25.0.0/22"
          per_vrf_loopback_auto_provision_ipv6: true
          per_vrf_loopback_ipv6_range: "fd00::a25:0/112"
          banner: "^ Updated via replaced state ^"
          day0_bootstrap: false
          local_dhcp_server: false
          dhcp_protocol_version: dhcpv4
          dhcp_start_address: ""
          dhcp_end_address: ""
          management_gateway: ""
          management_ipv4_prefix: 24
          management_ipv6_prefix: 64
  register: ebgp_replaced_result_2
  tags: [test_replaced, test_replaced_idempotent]

- name: "TEST 2b: Verify replaced state is idempotent"
  assert:
    that:
      - ebgp_replaced_result_2 is not changed
      - ebgp_replaced_result_2 is not failed
    fail_msg: "Replaced state is not idempotent - should not change when run twice with same config"
    success_msg: "Replaced state is idempotent - no changes on second run"
  tags: [test_replaced, test_replaced_idempotent]

- name: "TEST 2c: Update eBGP fabric using state replaced (complete replacement with minimal config)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: replaced
    config:
      - fabric_name: "{{ ebgp_test_fabric_replaced }}"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: vxlanEbgp
          bgp_asn: "65004"              # Different from default ASN
          bgp_asn_auto_allocation: true
          bgp_asn_range: "65000-65100"
          site_id: "65004"
          banner: "^ Updated via replaced state ^"
  register: ebgp_replaced_result_3
  tags: [test_replaced, test_replaced_update]

- name: "TEST 2c: Verify eBGP fabric was completely replaced (defaults restored)"
  assert:
    that:
      - ebgp_replaced_result_3 is changed
      - ebgp_replaced_result_3 is not failed
    fail_msg: "eBGP fabric replacement with state replaced failed"
    success_msg: "eBGP fabric successfully replaced with state replaced"
  tags: [test_replaced, test_replaced_update]

#############################################################################
# VALIDATION: Query ebgp_test_fabric_replaced and validate defaults are restored
#############################################################################
- name: "VALIDATION 2: Authenticate with ND to get token"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/login"
    method: POST
    headers:
      Content-Type: "application/json"
    body_format: json
    body:
      domain: "{{ ansible_httpapi_login_domain | default('local') }}"
      userName: "{{ ansible_user }}"
      userPasswd: "{{ ansible_password }}"
    validate_certs: false
    return_content: true
    status_code:
      - 200
  register: nd_auth_response_2
  tags: [test_replaced, test_replaced_validation]
  delegate_to: localhost

- name: "VALIDATION 2: Query ebgp_test_fabric_replaced configuration from ND"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ ansible_httpapi_port | default(443) }}/api/v1/manage/fabrics/{{ ebgp_test_fabric_replaced }}"
    method: GET
    headers:
      Authorization: "Bearer {{ nd_auth_response_2.json.jwttoken }}"
      Content-Type: "application/json"
    validate_certs: false
    return_content: true
    status_code:
      - 200
      - 404
  register: ebgp_replaced_fabric_query
  tags: [test_replaced, test_replaced_validation]
  delegate_to: localhost

- name: "VALIDATION 2: Parse eBGP fabric configuration response"
  set_fact:
    ebgp_replaced_fabric_config: "{{ ebgp_replaced_fabric_query.json }}"
  tags: [test_replaced, test_replaced_validation]

# Network Range Validations - verify defaults were restored
- name: "VALIDATION 2: Verify L3 VNI Range was standardized to 50000-59000"
  assert:
    that:
      - ebgp_replaced_fabric_config.management.l3VniRange == "50000-59000"
    fail_msg: "L3 VNI Range validation failed. Expected: 50000-59000, Actual: {{ ebgp_replaced_fabric_config.management.l3VniRange }}"
    success_msg: "✓ L3 VNI Range correctly standardized to 50000-59000"
  tags: [test_replaced, test_replaced_validation]

- name: "VALIDATION 2: Verify L2 VNI Range was standardized to 30000-49000"
  assert:
    that:
      - ebgp_replaced_fabric_config.management.l2VniRange == "30000-49000"
    fail_msg: "L2 VNI Range validation failed. Expected: 30000-49000, Actual: {{ ebgp_replaced_fabric_config.management.l2VniRange }}"
    success_msg: "✓ L2 VNI Range correctly standardized to 30000-49000"
  tags: [test_replaced, test_replaced_validation]

- name: "VALIDATION 2: Verify BGP Loopback IP Range was standardized to 10.2.0.0/22"
  assert:
    that:
