#############################################################################
# TEST 3: Demonstrate difference between merged and replaced states
#############################################################################
- name: "TEST 3: Create eBGP fabric for merged vs replaced comparison"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: replaced
    config:
      - "{{ {'fabric_name': ebgp_test_fabric_deleted} | combine(fabric_config_ebgp) }}"
  register: ebgp_comparison_fabric_creation
  tags: [test_comparison]

- name: "TEST 3a: Partial update using merged state (should merge changes)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: merged
    config:
      - fabric_name: "{{ ebgp_test_fabric_deleted }}"
        category: fabric
        management:
          bgp_asn: "65004"              # Different from default ASN
          # bgp_asn_auto_allocation: true
          bgp_asn_range: "65000-65100"
          fabric_mtu: 8000       # Only updating MTU
  register: ebgp_merged_partial_result
  tags: [test_comparison, test_merged_partial]

- name: "TEST 3a: Verify merged state preserves existing configuration"
  assert:
    that:
      - ebgp_merged_partial_result is changed
      - ebgp_merged_partial_result is not failed
    fail_msg: "Partial update with merged state failed"
    success_msg: "Merged state successfully performed partial update"
  tags: [test_comparison, test_merged_partial]

- name: "TEST 3b: Partial update using replaced state (should replace entire config)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: replaced
    config:
      - fabric_name: "{{ ebgp_test_fabric_deleted }}"
        category: fabric
        management:
          type: vxlanEbgp
          bgp_asn: "65100"
          bgp_asn_auto_allocation: true
          bgp_asn_range: "65000-65100"
          target_subnet_mask: 30
  register: ebgp_replaced_partial_result
  tags: [test_comparison, test_replaced_partial]

- name: "TEST 3b: Verify replaced state performs complete replacement"
  assert:
    that:
      - ebgp_replaced_partial_result is changed
      - ebgp_replaced_partial_result is not failed
    fail_msg: "Partial replacement with replaced state failed"
    success_msg: "Replaced state successfully performed complete replacement"
  tags: [test_comparison, test_replaced_partial]

#############################################################################
# TEST 4: STATE DELETED - Delete fabrics
#############################################################################
- name: "TEST 4a: Delete eBGP fabric using state deleted"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: deleted
    config:
      - fabric_name: "{{ ebgp_test_fabric_deleted }}"
  register: ebgp_deleted_result_1
  tags: [test_deleted, test_deleted_delete]

- name: "TEST 4a: Verify eBGP fabric was deleted"
  assert:
    that:
      - ebgp_deleted_result_1 is changed
      - ebgp_deleted_result_1 is not failed
    fail_msg: "eBGP fabric deletion with state deleted failed"
    success_msg: "eBGP fabric successfully deleted with state deleted"
  tags: [test_deleted, test_deleted_delete]

- name: "TEST 4b: Delete eBGP fabric using state deleted (second run - idempotency test)"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: deleted
    config:
      - fabric_name: "{{ ebgp_test_fabric_deleted }}"
  register: ebgp_deleted_result_2
  tags: [test_deleted, test_deleted_idempotent]

- name: "TEST 4b: Verify deleted state is idempotent"
  assert:
    that:
      - ebgp_deleted_result_2 is not changed
      - ebgp_deleted_result_2 is not failed
    fail_msg: "Deleted state is not idempotent - should not change when deleting non-existent fabric"
    success_msg: "Deleted state is idempotent - no changes when deleting non-existent fabric"
  tags: [test_deleted, test_deleted_idempotent]

#############################################################################
# TEST 5: Multiple fabric operations in single task
#############################################################################
- name: "TEST 5: Multiple eBGP fabric operations in single task"
  cisco.nd.nd_manage_fabric_ebgp:
    <<: *nd_info
    state: merged
    config:
      - fabric_name: "multi_ebgp_fabric_1"
        category: fabric
        location:
          latitude: 37.7749
          longitude: -122.4194
        license_tier: premier
        alert_suspend: disabled
        security_domain: all
        telemetry_collection: false
        management:
          type: vxlanEbgp
          bgp_asn: "65101"
          bgp_asn_auto_allocation: false
          site_id: "65101"
          bgp_as_mode: sameTierAS
          bgp_allow_as_in_num: 1
          bgp_max_path: 4
          auto_configure_ebgp_evpn_peering: true
          target_subnet_mask: 30
          anycast_gateway_mac: "2020.0000.0001"
          performance_monitoring: false
          replication_mode: multicast
          multicast_group_subnet: "239.1.1.0/25"
          auto_generate_multicast_group_address: false
          underlay_multicast_group_address_limit: 128
          tenant_routed_multicast: false
          rendezvous_point_count: 2
          rendezvous_point_loopback_id: 254
          vpc_peer_link_vlan: "3600"
          vpc_peer_link_enable_native_vlan: false
          vpc_peer_keep_alive_option: management
          vpc_auto_recovery_timer: 360
          vpc_delay_restore_timer: 150
          vpc_peer_link_port_channel_id: "500"
          advertise_physical_ip: false
          vpc_domain_id_range: "1-1000"
          bgp_loopback_id: 0
          nve_loopback_id: 1
          vrf_template: Default_VRF_Universal
          network_template: Default_Network_Universal
